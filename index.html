<title>CSEC 2300 - Foundations of Cyber Security</title>
<style>

}

  :root{
    --bg:#131518; --surface:#1c1f24; --surface-2:#24282e;

  }
}
:root[data-theme="dark"]{
  --bg:#131518; --surface:#1c1f24; --surface-2:#24282e;
  --text:#e8e9ec; --muted:#9aa1ab; --line:#33383f;
  --red-soft:rgba(203,51,59,.20); --ok:#4cc38a;
  --code-bg:#15181c; --code-border:#33383f;
  --shadow:0 1px 3px rgba(0,0,0,.35),0 8px 24px rgba(0,0,0,.30);
}
:root[data-theme="light"]{
  --bg:#f7f7f9; --surface:#ffffff; --surface-2:#f1f1f4;
  --text:#1c1e22; --muted:#5b616b; --line:#e2e3e8;

}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);

}

/* ---------- header ---------- */
header.site{
  position:sticky;top:0;z-index:60;

}
header.site .titles{flex:1;min-width:0}
header.site h1{font-size:1.15rem;margin:0;line-height:1.2;letter-spacing:-.01em}
header.site .sub{font-size:.82rem;opacity:.92;margin:.12rem 0 0}
header.site .hbtn{
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);
  color:#fff;border-radius:8px;padding:.42rem .6rem;cursor:pointer;
  font-size:.9rem;line-height:1;display:inline-flex;align-items:center;gap:.35rem;
}
header.site .hbtn:hover{background:rgba(255,255,255,.24)}
#menuBtn{display:none}

/* ---------- layout ---------- */
.wrap{display:flex;min-height:calc(100vh - 58px)}
aside{
  width:var(--sidebar-w);flex:0 0 var(--sidebar-w);
  background:var(--surface);border-right:1px solid var(--line);
  height:calc(100vh - 58px);position:sticky;top:58px;overflow-y:auto;
  padding:.9rem .8rem 3rem;
}
.searchbox{position:relative;margin-bottom:.8rem}
.searchbox input{
  width:100%;padding:.55rem .7rem;border:1px solid var(--line);border-radius:9px;

}
.searchbox input:focus{outline:2px solid var(--red);outline-offset:0;border-color:var(--red)}

.navgroup{margin-bottom:.5rem}
.navgroup>.gh{
  font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;font-weight:800;
  color:var(--red);padding:.5rem .5rem .3rem;
}
.tree{list-style:none;margin:0;padding:0}
.tree li{margin:0}
.tree a, .tree button.tw, .tree .leaf{
  display:flex;align-items:center;gap:.4rem;width:100%;text-align:left;
  background:none;border:none;cursor:pointer;color:var(--text);
  font-size:.9rem;font-family:inherit;padding:.4rem .5rem;border-radius:8px;

.tree a.ext:hover::after,.tree .leaf.active .ext::after{color:inherit}
.tree .meta{color:var(--muted);font-size:.72rem;margin-left:auto;font-weight:500}
.caret{display:inline-block;width:.7rem;transition:transform .15s;color:var(--muted);font-size:.7rem}

.md img{max-width:100%;height:auto;border:1px solid var(--line);border-radius:10px;margin:.8rem 0;display:block;box-shadow:var(--shadow)}

<script id="course-data" type="application/json">{"docs": {"labs/lab-00-environment-setup/HINTS.md": "# Lab 0 - Hints (three tiers per task group)\n\n## Task group A - Git identity & SSH key\n- **Tier 1 (nudge):** Git needs to know who you are before it can attribute commits. See the \"First-Time Git Setup\" chapter: https://git-scm.com/book/en/v2/Getting-Started-First-Time-Git-Setup and GitHub's SSH docs: https://docs.github.com/en/authentication/connecting-to-github-with-ssh\n- **Tier 2 (guided):** Use `git config --global user.name` and `git config --global user.email`. Generate a key with `ssh-keygen -t ed25519 -C \"you@example.com\"`. Show its fingerprint with `ssh-keygen -lf ~/.ssh/id_ed25519.pub`.\n- **Tier 3 (near-solution):**\n  ```\n  git config --global user.name \"_____\"\n  git config --global user.email \"_____@_____\"\n  ssh-keygen -t ed25519 -C \"_____\"\n  ssh-keygen -lf ~/.ssh/id_ed25519.pub   # paste this SHA256:____ line into the report\n  ```\n\n## Task group B - GitHub account & smoke tests\n- **Tier 1 (nudge):** Confirm the toolchain actually runs, not just that it is installed. Docker: https://docs.docker.com/get-started/  ·  NVIDIA SMI: https://developer.nvidia.com/nvidia-system-management-interface\n- **Tier 2 (guided):** Capture `docker --version` and `docker run --rm hello-world`. For GPU use `nvidia-smi`; on a Mac without NVIDIA use `system_profiler SPDisplaysDataType`.\n- **Tier 3 (near-solution):**\n  ```\n  { docker --version; docker run --rm hello-world; nvidia-smi || system_profiler SPDisplaysDataType; } | tee env-check.txt\n  ```\n\n## Task group C - Report structure\n- **Tier 1 (nudge):** The grader looks for specific section headings; skim the Grading table in the README.\n- **Tier 2 (guided):** Use markdown `##` headings named exactly Identity, SSH, GitHub, Docker, GPU. Remove every `TODO`/`<...>` placeholder.\n- **Tier 3 (near-solution):**\n  ```\n  ## Identity\n  Name: _____   Email: _____\n  ## SSH\n  Fingerprint: SHA256:_____\n  ## GitHub\n  Username: _____   Profile: https://github.com/_____\n  ## Docker\n  _____ (paste version + hello-world confirmation)\n  ## GPU\n  _____ (paste nvidia-smi / system_profiler summary)\n  ```\n", "labs/lab-00-environment-setup/README.md": "# Lab 0: Environment & Identity Setup\n\n**Course:** CSEC 2300-01 Foundations of Cyber Security (UIW) - Dr. Gonzalo D Parra\n**Points:** 100  ·  **Estimated time:** 90 min  ·  **Autograding:** GitHub Actions + local `autograde/run.sh`\n\n## Objective\nStand up the toolchain and professional identity you will use all semester: a\nconfigured `git`, an SSH key registered with GitHub, a working GitHub account,\nand a Docker + GPU smoke test. You will capture proof in a `setup-report.md`\nand a captured command-output file.\n\n**Why it matters:** every later lab is delivered through a private GitHub repository and\ngraded by automation. A security professional (CO5) works from a trusted,\nidentifiable, reproducible workstation - this lab builds yours.\n\n## Course-Outcome Mapping\n| Outcome | Evidence in this lab |\n|---------|----------------------|\n| CO5 - Activities a security specialist performs | Configure identity, keys, and container/GPU tooling |\n| CO6 - Security+ SY0-701 readiness | Practices in Domain 4.0 (Security Operations): secure configuration, identity |\n\n**Security+ SY0-701 domain:** 4.0 Security Operations (secure baseline, identity & access).\n\n## Prerequisites\n- A computer with `git`, `ssh`, and Docker installed (lab GPU machines qualify).\n- A GitHub account (create one at https://github.com/join if needed - do this yourself; the grader never asks for a password).\n\n## Tasks\n1. **Identity** - set `git config --global user.name` and `user.email`, then record them in `setup-report.md`.\n2. **SSH key** - generate an ed25519 key (`ssh-keygen -t ed25519`), add the public key to GitHub, and paste your public key fingerprint into the report.\n3. **GitHub account** - record your GitHub username and profile URL.\n4. **Docker smoke test** - run `docker --version` and `docker run --rm hello-world`; capture output.\n5. **GPU smoke test** - run `nvidia-smi` (lab machines) or `system_profiler SPDisplaysDataType` / `sysctl -n machdep.cpu.brand_string` (Mac); capture output.\n6. **Capture** - save the combined command output to `env-check.txt` and summarize in `setup-report.md` under the required headings.\n\n## Deliverables\n- `setup-report.md` with headings: **Identity**, **SSH**, **GitHub**, **Docker**, **GPU** (all filled, no placeholders).\n- `env-check.txt` - captured output of the smoke-test commands.\n\n## Submission\nCommit both files and push to your a private GitHub repository repo. The Actions workflow\nruns `autograde/run.sh` automatically; you can also run it locally:\n```\nbash autograde/run.sh\n```\n\n## Grading\n| Criterion | Points |\n|-----------|-------:|\n| `setup-report.md` present | 5 |\n| Git identity (name + email) recorded | 10 |\n| SSH key / fingerprint present | 10 |\n| GitHub username / profile recorded | 10 |\n| `env-check.txt` capture present | 10 |\n| Docker smoke output present | 10 |\n| GPU / CPU smoke output present | 10 |\n| Required report sections present | 15 |\n| No leftover placeholders | 10 |\n| Report meets minimum length (150 words) | 10 |\n| **Total** | **100** |\n", "labs/lab-00-environment-setup/STUDENT-GUIDE.md": "# Lab 0 Student Guide: Environment and Identity Setup\n\n## What you will build\n\nYou will turn your laptop or lab workstation into a working, identifiable\ndevelopment machine: git configured with your name and email, an SSH key\nregistered with GitHub, and a Docker install that can pull and run a\ncontainer. You will prove it worked with two files: `setup-report.md` and\n`env-check.txt`. Every lab for the rest of the semester assumes this\nbaseline is in place, so getting it right now saves you time later.\n\n## Before you start\n\n- You need a computer with `git`, `ssh`, and Docker installed. The campus\n  GPU lab workstations already have all three (they run Windows with\n  Docker Desktop and an NVIDIA GPU). On your own laptop, install\n  [Git](https://git-scm.com/downloads) and\n  [Docker Desktop](https://www.docker.com/products/docker-desktop/) first;\n  `ssh` ships with Windows 10/11, macOS, and Linux already.\n- You need a GitHub account. If you do not have one, create it yourself at\n  https://github.com/join. The grader never asks for your password; do not\n  type your GitHub password into any script or terminal.\n- The graded assignment, the a private GitHub repository accept link, and the exact\n  point values live in the **Lab 0** assignment on Canvas and in this\n  repository's `README.md`. This guide walks you through the mechanics of\n  doing the work; it does not replace README.md or HINTS.md, which are the\n  authoritative source for what is being graded. If you get stuck, open\n  `HINTS.md` in this folder for a three-tier hint ladder before asking the\n  instructor.\n\n## Step 1: Accept and open the lab\n\n1. Click the repository invitation posted on Canvas for Lab 0.\n   Accept it with your own GitHub account. Your instructor has created a private\n   repository for you named something like\n   `lab-00-environment-setup-yourusername`.\n2. Clone your repository to your machine. Replace the URL with the one\n   GitHub shows you after you accept the invitation:\n   ```\n   git clone git@github.com:your-org/lab-00-environment-setup-yourusername.git\n   cd lab-00-environment-setup-yourusername\n   ```\n   If you have not set up an SSH key yet, clone with the HTTPS URL instead\n   (you will still add an SSH key as part of this lab):\n   ```\n   git clone https://github.com/your-org/lab-00-environment-setup-yourusername.git\n   ```\n3. Confirm you are in the right folder. You should see `README.md`,\n   `HINTS.md`, `setup-report.md`, and an `autograde/` folder.\n   ```\n   ls\n   ```\n\n## Step 2: Run the system check first\n\nBefore doing any work, ask the grader whether your machine is even ready.\nThis does not grade your submission; it only checks that the tools you\nneed are installed and reachable.\n\n```\nbash autograde/run.sh --syscheck\n```\n\n> what you'll see:\n> ```\n> System check (pre-flight) for lab-00-environment-setup-yourusername\n> ------------------------------------------------------------------------\n> STATUS CHECK                                    FIX HINT\n> PASS   python3 available\n> PASS   git identity configured\n> PASS   git installed\n> PASS   docker installed\n> PASS   starter files intact\n> ------------------------------------------------------------------------\n> All preflight checks passed - you can start the lab.\n> ```\n\nA copy of a clean syscheck run is saved at\n`guide-assets/lab-00-syscheck.png` so you know what \"all green\" looks\nlike.\n\nIf you see a `FAIL` line, fix only that item and re-run the same command:\n\n- **`git identity configured` FAILS** - you have not set your name/email\n  yet. Do Step 3 below first.\n- **`git installed` / `docker installed` FAILS** - the tool is missing or\n  not on your PATH. Reinstall it, restart your terminal, and try again. On\n  Windows, make sure you are using the terminal that Git Bash or Docker\n  Desktop set up (a fresh terminal window after install usually fixes a\n  stale PATH).\n- **`starter files intact` FAILS** - you (or a stray script) deleted or\n  renamed `setup-report.md` or `scripts/smoke-test.sh`. Restore them by\n  re-cloning the repo into a new folder and copying the missing file back,\n  or `git checkout -- <file>` if you have not committed over it.\n\nDo not move on to Step 3 until this table is all `PASS`.\n\n## Step 3: Set your git identity\n\nGit stamps every commit with a name and email. Set both globally so every\nrepository on your machine uses them:\n\n```\ngit config --global user.name \"Your Full Name\"\ngit config --global user.email \"you@example.com\"\n```\n\nUse the email address associated with your GitHub account so later\ncriteria can cross-check it. Confirm it stuck:\n\n```\ngit config --global user.name\ngit config --global user.email\n```\n\n> what you'll see: your name on one line, your email on the next. If\n> either line is blank, the `git config --global` command above did not\n> run, or you mistyped it.\n\n## Step 4: Generate an SSH key and add it to GitHub\n\nAn SSH key lets you authenticate to GitHub without typing a password every\ntime you push. Ed25519 is the modern, recommended key type.\n\n1. Generate the key (press Enter through the prompts to accept the\n   default file location; a passphrase is optional but recommended):\n   ```\n   ssh-keygen -t ed25519 -C \"you@example.com\"\n   ```\n2. Print the fingerprint you will paste into your report:\n   ```\n   ssh-keygen -lf ~/.ssh/id_ed25519.pub\n   ```\n   > what you'll see: a line like\n   > `256 SHA256:AbCdEf...restofthefingerprint you@example.com (ED25519)`\n3. Print the public key itself and copy the whole line (starts with\n   `ssh-ed25519`):\n   ```\n   cat ~/.ssh/id_ed25519.pub\n   ```\n4. On GitHub: click your avatar > **Settings** > **SSH and GPG keys** >\n   **New SSH key**. Paste the public key, give it a title (for example\n   \"Lab 0 workstation\"), and save.\n5. Test the connection:\n   ```\n   ssh -T git@github.com\n   ```\n   > what you'll see: `Hi yourusername! You've successfully\n   > authenticated, but GitHub does not provide shell access.` That\n   > message is success, not an error.\n\nWindows users: run these same commands from Git Bash, which installs with\nGit for Windows and gives you the `ssh-keygen`/`ssh` commands used above.\n\n## Step 5: Record your GitHub account\n\nIn `setup-report.md`, under the `## GitHub` heading, write your GitHub\nusername and your profile URL in the form `https://github.com/yourusername`.\nThis is how the grader confirms you have a real GitHub identity attached\nto the submission.\n\n## Step 6: Run the Docker and GPU/CPU smoke test\n\nThis lab ships a script that captures everything the grader looks for in\none shot: `scripts/smoke-test.sh`. Run it from the repository root:\n\n```\nbash scripts/smoke-test.sh\n```\n\n> what you'll see: the script prints git version/identity, your SSH key\n> fingerprint (or \"no ed25519 key yet\" if you skipped Step 4), the Docker\n> version followed by the \"Hello from Docker!\" message, and either an\n> `nvidia-smi` table (GPU lab machines) or a `system_profiler`/CPU summary\n> (Mac laptops without a discrete GPU). All of that output is written to\n> `env-check.txt` in the same folder - that is the file the grader reads.\n\nIf the Docker lines are missing or the script stops with an error:\n\n- **`docker: command not found`** - Docker is not installed or not on\n  PATH. Install Docker Desktop and reopen your terminal.\n- **`Cannot connect to the Docker daemon`** - Docker is installed but not\n  running. Open the Docker Desktop application and wait for the whale\n  icon in the menu bar/system tray to say it is running, then re-run the\n  script.\n- **On a lab machine, `nvidia-smi` prints nothing or errors** - that is\n  fine; the script automatically falls back to a CPU/GPU summary command.\n  You do not need to do anything extra.\n\nOpen `env-check.txt` afterward and confirm it actually contains the\nDocker version line, the \"Hello from Docker!\" message, and a GPU or CPU\nline. If any of those three are missing, re-run the script - do not hand\nedit `env-check.txt`, since a captured command is stronger evidence than\ntyped-in text.\n\n## Step 7: Finish setup-report.md\n\nOpen `setup-report.md` and fill in every section. Keep the exact heading\nnames (`## Identity`, `## SSH`, `## GitHub`, `## Docker`, `## GPU`); the\ngrader looks for those exact words. Delete every placeholder marker\n(`_____`, `<your ...>`, `TODO`) as you fill each section in - a leftover\nplaceholder anywhere in the file costs you points even if the rest of the\nsection is correct.\n\n- **Identity**: your name and email, matching Step 3.\n- **SSH**: the `SHA256:...` fingerprint from Step 4 (not the whole private\n  key - never paste a private key anywhere).\n- **GitHub**: your username and profile URL from Step 5.\n- **Docker**: a short written confirmation that `docker --version` and\n  `docker run --rm hello-world` worked, in your own words.\n- **GPU**: a short written summary of what your GPU/CPU smoke test showed.\n- **Reflection**: a few sentences on your workstation and anything you had\n  to troubleshoot. This section, combined with the rest of the file, needs\n  to add up to at least 150 words total, so do not leave it as one line.\n\n## Final step: Validate and capture your proof\n\nRun the real grader (not `--syscheck` this time):\n\n```\nbash autograde/run.sh\n```\n\nThis prints a JSON report with one entry per graded criterion, a `total`\nout of 100, and two verification codes at the bottom: `WORK-FP` (a\nfingerprint of your submitted files) and `ATTEST` (a code tying that\nfingerprint to your repository and commit). Read the `feedback` field on\nany criterion that is not at full points; it tells you exactly what the\ngrader could not find.\n\n> what you'll see when everything is correct:\n> ```\n> {\n>   \"total\": 100,\n>   \"max\": 100,\n>   ...\n>   \"work_fp\": \"9258835520f0\",\n>   \"attest\": \"6cf0bfc32a8d\"\n> }\n>\n> WORK-FP  : 9258835520f0\n> ATTEST   : 6cf0bfc32a8d\n> ```\n> An example of this finished output is saved at\n> `guide-assets/lab-00-completion.png` - your codes will be different\n> since they are derived from your own files and repository.\n\n**Take a screenshot of your terminal showing this full result, including\nthe `WORK-FP` and `ATTEST` lines and the `total` score.** That screenshot\nis what you submit as proof of completion, alongside committing and\npushing `setup-report.md` and `env-check.txt`:\n\n```\ngit add setup-report.md env-check.txt\ngit commit -m \"Complete Lab 0 environment setup\"\ngit push\n```\n\nPushing triggers the same grader automatically in GitHub Actions; check\nthe Actions tab on your repository to confirm it also reports your score.\n\n## Troubleshooting\n\n- **My `git_identity` criterion is 0 even though I set my name/email.**\n  The grader reads the email out of `setup-report.md`, not out of your\n  git config directly. Make sure the exact email you typed after `Email:`\n  under `## Identity` is a real address (`name@domain.tld` shape) and\n  matches what you used in Step 3.\n- **My `ssh_key` criterion is 0.** The grader looks for a real\n  `ssh-ed25519 AAAA...` public key line or a `SHA256:` fingerprint of at\n  least 20 characters in `setup-report.md`. Paste the actual output of\n  `ssh-keygen -lf ~/.ssh/id_ed25519.pub`, not the literal text\n  `SHA256:_____` left over from the template.\n- **`docker run --rm hello-world` hangs or fails to pull the image.** You\n  need an internet connection the first time, since Docker pulls the\n  image from Docker Hub. On a restricted network, connect to a different\n  network (or campus wifi instead of a VPN) and try again.\n- **My word count is under 150 even though I filled every section.** Short\n  one-line answers in Docker/GPU/Reflection usually do not reach 150\n  words on their own. Add two or three more sentences describing what you\n  saw and any problem you solved, in your own words.\n- **I do not have an NVIDIA GPU on my laptop.** That is expected on most\n  laptops. Use the Mac fallback (`system_profiler SPDisplaysDataType`) or,\n  if that also fails, `sysctl -n machdep.cpu.brand_string` for CPU info.\n  The smoke-test script already tries these in order, so you usually do\n  not need to run them by hand.\n", "labs/lab-00-environment-setup/setup-report.md": "# Setup Report - Lab 0\n\nFill every section. Remove the placeholder markers (`_____`, `<your ...>`, `TODO`)\nas you complete each item. The autograder checks for these headings.\n\n## Identity\nName: _____\nEmail: _____@_____\n\n## SSH\nFingerprint: SHA256:_____\n(paste the output of `ssh-keygen -lf ~/.ssh/id_ed25519.pub`)\n\n## GitHub\nUsername: _____\nProfile: https://github.com/_____\n\n## Docker\nTODO: paste confirmation that `docker --version` and `docker run --rm hello-world` worked.\n\n## GPU\nTODO: paste a short summary of `nvidia-smi` (lab machine) or `system_profiler SPDisplaysDataType` (Mac).\n\n## Reflection\nTODO: In a few sentences, describe your workstation and any setup problems you solved.\n", "labs/lab-01-framework-mapping/HINTS.md": "# Lab 1 - Hints (three tiers)\n\n## Task group A - NIST CSF functions\n- **Tier 1 (nudge):** The five functions form a lifecycle from knowing your assets to bouncing back. Read the CSF 2.0 overview: https://www.nist.gov/cyberframework\n- **Tier 2 (guided):** Match verbs - inventorying assets = **Identify**; MFA/patching = **Protect**; SIEM alert = **Detect**; isolating a host = **Respond**; restoring backups = **Recover**.\n- **Tier 3 (near-solution):** A SIEM alarm firing on anomalous logins is `Detect`. Pulling the infected laptop off the network is `Respond`. Restoring files from last night's backup is `______`.\n\n## Task group B - CIS Controls v8\n- **Tier 1 (nudge):** CIS Controls are numbered 1–18. Browse the list: https://www.cisecurity.org/controls/cis-controls-list\n- **Tier 2 (guided):** Access Control Management is Control **6**; Email and Web Browser Protections is Control **9**; Data Recovery is Control **11**; Audit Log Management is Control **8**.\n- **Tier 3 (near-solution):** Enforcing MFA on VPN belongs to CIS Control `___` (Access Control Management). Answer with just the number.\n\n## Task group C - CIA impact & YAML format\n- **Tier 1 (nudge):** Ransomware encrypts files in place - which leg of the CIA triad does that hit first? https://csrc.nist.gov/glossary/term/cia_triad\n- **Tier 2 (guided):** Use plain `key: value` lines. Answer CIA with one word: confidentiality, integrity, or availability.\n- **Tier 3 (near-solution):**\n  ```\n  ransomware_primary_impact: ____________   # one of: confidentiality / integrity / availability\n  ```\n", "labs/lab-01-framework-mapping/README.md": "# Lab 1: Framework Mapping (NIST CSF & CIS Controls)\n\n**Course:** CSEC 2300-01 Foundations of Cyber Security (UIW) - Dr. Gonzalo D Parra\n**Points:** 100  ·  **Estimated time:** 75 min  ·  **Autograding:** Structured-answer grader (`answers.yaml`)\n\n## Objective\nRead a realistic breach scenario and map its events to the five **NIST CSF 2.0**\nfunctions (Identify, Protect, Detect, Respond, Recover) and to specific **CIS\nCritical Security Controls v8**. You produce a machine-checkable `answers.yaml`.\n\n**Why it matters:** frameworks are the shared language of security governance\n(CO1). Analysts translate messy incidents into framework language every day.\n\n## Course-Outcome Mapping\n| Outcome | Evidence |\n|---------|----------|\n| CO1 - Basic concepts of information systems security | Classify events by CSF function and CIS control |\n| CO6 - Security+ readiness | Domain 5.0 (Governance, Risk & Compliance): frameworks |\n\n**Security+ SY0-701 domain:** 5.0 Security Program Management & Oversight (frameworks, GRC); 1.0 General Security Concepts.\n\n## Per-student scenario\nYou are assigned scenario **A** or **B** based on your repository (anti-copy: a\nclassmate on the other variant has different correct answers). First run:\n```\nbash starter/which-scenario.sh\n```\nThen read `starter/scenario-A.md` **or** `starter/scenario-B.md` accordingly.\n\n## Prerequisites\n- Run `starter/which-scenario.sh` and read your assigned scenario file.\n- Skim the NIST CSF 2.0 functions and the CIS Controls v8 list (links in HINTS).\n\n## Tasks\n1. Determine your variant and read the matching scenario file.\n2. For each numbered event, choose the **primary CSF function**.\n3. For each control question, name the **CIS Control number** that best applies.\n4. Answer the impact question (CIA triad).\n5. Fill all fields in `answers.yaml` (copy the template from `starter/answers-template.yaml`).\n\n## Deliverables\n- `answers.yaml` at the repo root with every field filled.\n\n## Submission\nPush to your repository; the workflow runs `autograde/run.sh`. Run locally with `bash autograde/run.sh`.\nRun `bash autograde/run.sh --syscheck` first to confirm your environment.\n\n## Grading\n| Criterion | Points |\n|-----------|-------:|\n| `answers.yaml` present & parseable | 10 |\n| CSF: detection event -> Detect | 10 |\n| CSF: containment event -> Respond | 10 |\n| CSF: preventive control -> Protect | 10 |\n| CSF: restore-from-backup -> Recover | 10 |\n| CSF: asset inventory -> Identify | 10 |\n| CIS: primary (access control) number | 10 |\n| CIS: secondary number (variant-dependent) | 10 |\n| CIS: recovery (backups) number | 10 |\n| CIA: primary impact (variant-dependent) | 10 |\n| **Total** | **100** |\n", "labs/lab-01-framework-mapping/STUDENT-GUIDE.md": "# Student Guide: Lab 1 - Framework Mapping (NIST CSF & CIS Controls)\n\nThis guide walks you through the mechanics of completing and submitting Lab 1.\nIt does not give you the analysis answers - those come from reading your\nscenario carefully and using `README.md` and `HINTS.md`. Follow the steps\nbelow in order.\n\n## 1. What you will build / prove\n\nYou will read a short breach-scenario writeup (assigned to you personally,\neither Scenario A or Scenario B), classify its events against the five NIST\nCSF 2.0 functions, name the relevant CIS Controls v8 numbers, and identify\nthe primary CIA-triad impact. Your answers go into one file, `answers.yaml`,\nat the root of your repository. An automated grader checks that file and\ngives you a score out of 100.\n\n## 2. Before you start\n\nYou need:\n- A web browser and a GitHub account (from Lab 0).\n- `git` installed and configured (from Lab 0).\n- `python3` available on your machine (this lab's grader is pure Python,\n  no Docker or GPU required).\n\nThe authoritative instructions for what to analyze and how to answer live in\ntwo files inside your repo once you accept the assignment:\n- **`README.md`** - the objective, the tasks, and the exact grading table.\n- **`HINTS.md`** - a three-tier hint ladder (nudge -> guided -> near-solution)\n  for the CSF functions, the CIS Controls, and the CIA/YAML format.\n\nThis guide only covers *how to run things*. For *what the right answer is*,\nread those two files and think through your assigned scenario.\n\n## 3. Step 1 - Accept and open the lab\n\n1. Open the Lab 1 assignment link posted on Canvas. It is a a private GitHub repository\n   invite.\n2. Click **Accept this assignment**. GitHub creates a personal copy of the\n   repository for you (this is what makes your scenario variant unique to\n   you - see Step 4).\n3. Clone your repository to your computer. Copy the clone URL from the green\n   **Code** button on your repo page, then in a terminal:\n   ```\n   git clone <your-repo-clone-url>\n   cd <your-repo-folder-name>\n   ```\n   On Windows, use **Git Bash** (installed with Git for Windows) for all\n   commands in this guide - it gives you the same `bash`/`ls`/`cd` commands\n   shown here.\n\n## 4. Step 2 - Find out your scenario variant\n\nYour scenario (A or B) is derived from your repository's name, so every\nstudent gets a consistent, personal variant. Run:\n```\nbash starter/which-scenario.sh\n```\n> **what you'll see:**\n> ```\n> Your assigned scenario variant: B\n> Read starter/scenario-B.md\n> ```\n> (Your letter may be A instead of B - that is expected and normal.)\n\nOpen the file it names (`starter/scenario-A.md` or `starter/scenario-B.md`)\nand read it carefully. Do not read the other scenario file - it belongs to a\ndifferent variant and its answers will not match yours.\n\n## 5. Step 3 - Run the system check first\n\nBefore doing any analysis, confirm your environment is ready:\n```\nbash autograde/run.sh --syscheck\n```\n> **what you'll see:**\n> ```\n> System check (pre-flight) for <your-repo-name>\n> ------------------------------------------------------------------------\n> STATUS CHECK                                    FIX HINT\n> PASS   python3 available\n> PASS   starter files intact\n> ------------------------------------------------------------------------\n> All preflight checks passed - you can start the lab.\n> ```\n\nSee the syscheck screenshot in `guide-assets/lab-01-syscheck.png` for a\nworked example.\n\nIf anything shows `FAIL`:\n- **`python3 available` fails** - install Python 3 from\n  https://www.python.org/downloads/ (Windows: check \"Add python.exe to PATH\"\n  during install) and reopen your terminal.\n- **`starter files intact` fails** - you (or a tool) deleted or renamed a\n  file under `starter/`. Do not edit or move anything in `starter/`; if a\n  file is missing, re-clone the repo into a fresh folder rather than trying\n  to recreate it by hand.\n\n## 6. Steps 4-6 - Do the analysis\n\nWork through the **Tasks** section of `README.md` in order:\n\n1. **Read your scenario file** end to end. It numbers a sequence of events\n   (phishing/misuse, detection, containment, impact, recovery, and a\n   post-incident gap) and lists three control questions plus one CIA\n   question.\n2. **Classify each event against a NIST CSF 2.0 function.** The five\n   functions are Identify, Protect, Detect, Respond, Recover - they form a\n   lifecycle from \"know what you have\" to \"bounce back after an incident.\"\n   `HINTS.md` Task Group A gives you verb-matching cues (for example, which\n   verbs typically signal a detection versus a containment action) if you\n   get stuck.\n3. **Name the CIS Control number** for each of the three control questions\n   in your scenario file (primary access-control question, a\n   scenario-specific secondary question, and the recovery/backups\n   question). `HINTS.md` Task Group B lists several named CIS Controls\n   v8 areas to help you narrow down the right number; the official list is\n   linked there too.\n4. **Answer the CIA question** with exactly one of: `confidentiality`,\n   `integrity`, or `availability` - whichever property the incident's impact\n   statement in your scenario primarily describes. `HINTS.md` Task Group C\n   walks through the reasoning.\n5. **Fill in `answers.yaml`.** Copy the template so you don't miss a field:\n   ```\n   cp starter/answers-template.yaml answers.yaml\n   ```\n   Open `answers.yaml` in a text editor (VS Code, Notepad++, or even\n   Notepad) and replace every empty `\"\"` with your answer. Two formatting\n   rules the grader relies on:\n   - CSF answers are plain words: `identify`, `protect`, `detect`,\n     `respond`, or `recover` (lowercase is fine; the grader is\n     case-insensitive).\n   - CIS Control answers are just the **number** (for example `6`), not a\n     control name.\n   - Keep the `key: value` shape on one line per field. If you want to keep\n     a value in quotes, put it as `field: \"value\"` with nothing else after\n     the closing quote on that line - trailing text after a quoted value can\n     get folded into your answer by the simple parser this grader uses.\n\n   `answers.yaml` must live at the **root** of your repository (next to\n   `README.md`), not inside `starter/`.\n\n## 7. Final step - Validate and capture your proof\n\nRun the grader:\n```\nbash autograde/run.sh\n```\nThis prints a JSON report with one entry per grading criterion (10 points\neach, 100 total), plus two verification codes at the bottom:\n```\nWORK-FP  : <a short hash of your submitted files>\nATTEST   : <a short hash tying your score to your repo and commit>\n```\n\n> **what a fully passing run looks like:** see\n> `guide-assets/lab-01-completion.png`. Your own file names, hashes, and\n> exact feedback text will differ - what matters is `\"total\": 100` and a\n> `WORK-FP` / `ATTEST` pair at the bottom.\n\n**This screenshot (or a copy/paste of your own terminal output showing the\nscore, `WORK-FP`, and `ATTEST`) is what you submit** as proof of completion,\nin addition to committing and pushing `answers.yaml`. Commit and push:\n```\ngit add answers.yaml\ngit commit -m \"Complete Lab 1 framework mapping\"\ngit push\n```\na private GitHub repository's Actions workflow re-runs the same grader on your pushed\nrepo automatically; you can check the result under the **Actions** tab on\nyour repo page.\n\nIf your score is below 100, read the `feedback` field for each criterion\nthat shows `0` points - it tells you exactly which field did not match and\nwhat CSF function or CIS Control number was expected for your variant.\nRe-check your scenario file and `HINTS.md`, fix the field in `answers.yaml`,\nand re-run `bash autograde/run.sh`.\n\n## 8. Troubleshooting\n\n- **My score does not match a friend's even though our `answers.yaml` look\n  similar.** This is expected. Each repository gets its own scenario\n  variant (A or B). Two students on different variants have different\n  correct CIS Control numbers and a different correct CIA answer - copying\n  a classmate's file will actively hurt your score if they are on the other\n  variant. Always confirm your variant with `starter/which-scenario.sh`.\n- **`answers.yaml missing or empty at repo root` even though I filled it\n  in.** You likely edited `starter/answers-template.yaml` instead of a copy\n  at the repo root, or saved the file with a different name/extension (some\n  editors add `.txt`). Confirm the file is named exactly `answers.yaml` and\n  sits next to `README.md`, run `ls` (or `dir` on Windows) to check.\n- **A field I filled in still shows as wrong.** Open `answers.yaml` in a\n  plain text editor and check for typos, extra words, or a trailing comment\n  stuck onto the same line as a quoted value (see the formatting rule in\n  Step 6.5). The grader looks for your answer word or number inside the\n  field's value, so stray extra text can still cause a mismatch if it\n  changes what is on that line.\n- **`bash: command not found` on Windows.** Make sure you are using **Git\n  Bash**, not the plain Windows Command Prompt or PowerShell, for every\n  command in this guide.\n- **I do not know which CSF function or CIS Control fits an event.** Do not\n  guess randomly - work through `HINTS.md` tier by tier (nudge, then\n  guided, then near-solution) before asking your instructor or TA.\n", "labs/lab-02-git-github-workflow/HINTS.md": "# Lab 2 - Hints (three tiers)\n\n## Task group A - Branch, merge, tag\n- **Tier 1 (nudge):** A feature branch keeps risky work off `main` until it is reviewed. Practice at https://learngitbranching.js.org/ then read https://docs.github.com/en/get-started/using-git\n- **Tier 2 (guided):** `git switch -c feature/x`, commit, then `git switch main && git merge --no-ff feature/x`. Tag with `git tag -a v1.0 -m \"...\"`.\n- **Tier 3 (near-solution):**\n  ```\n  git switch -c feature/____\n  git commit -am \"____\"\n  git switch main\n  git merge --no-ff feature/____ -m \"merge feature\"\n  git tag -a v1.0 -m \"release ____\"\n  ```\n\n## Task group B - Signed / signed-off commits\n- **Tier 1 (nudge):** Commit signing proves who authored a change. https://docs.github.com/en/authentication/managing-commit-signature-verification\n- **Tier 2 (guided):** SSH signing is easy: `git config gpg.format ssh` and `git config user.signingkey ~/.ssh/id_ed25519.pub`, then `git commit -S`. If keys are unavailable, `git commit -s` adds a Signed-off-by trailer (the grader accepts either).\n- **Tier 3 (near-solution):**\n  ```\n  git config --global gpg.format ssh\n  git config --global user.signingkey ~/.ssh/id_ed25519.pub\n  git commit -S -m \"signed: ____\"      # or:  git commit -s -m \"signed-off: ____\"\n  ```\n\n## Task group C - Secrets hygiene\n- **Tier 1 (nudge):** Never commit keys or `.env` files. https://docs.github.com/en/code-security/secret-scanning\n- **Tier 2 (guided):** Add patterns to `.gitignore` before creating any secret file. Verify with `git status --ignored`.\n- **Tier 3 (near-solution):**\n  ```\n  # .gitignore\n  *.env\n  *.pem\n  *.key\n  secrets/\n  ```\n", "labs/lab-02-git-github-workflow/README.md": "# Lab 2: Git & GitHub Workflow\n\n**Course:** CSEC 2300-01 Foundations of Cyber Security (UIW) - Dr. Gonzalo D Parra\n**Points:** 100  ·  **Estimated time:** 90 min  ·  **Autograding:** git-history inspection\n\n## Objective\nPractice the professional git workflow: feature branches, a merge, tags,\nsigned (or signed-off) commits, and secrets hygiene via `.gitignore`. The grader\ninspects your `git log`.\n\n**Why it matters:** version control is where security work is reviewed and\naudited (CO3). Clean history and no leaked secrets are baseline hygiene.\n\n## Course-Outcome Mapping\n| Outcome | Evidence |\n|---------|----------|\n| CO3 - Access control, identity, cryptography for securing/managing | Signed commits (identity/crypto), branch protection discipline |\n| CO6 - Security+ readiness | Domain 4.0 (Security Operations), 3.0 (change/config management) |\n\n**Security+ SY0-701 domain:** 4.0 Security Operations; 3.0 Security Architecture (change management).\n\n## Practice first\nWarm up on these before doing the graded tasks:\n- https://learngitbranching.js.org/\n- https://gitmastery.me/\n\n## Prerequisites\n- Lab 0 complete (git identity + SSH key).\n\n## Tasks\n1. Make at least **8 commits** spread over **at least 2 different clock hours** (work incrementally, not one bulk dump).\n2. Create a `feature/<name>` branch, commit on it, and **merge** it back into `main`.\n3. Create an annotated **tag** (e.g., `v1.0`).\n4. Keep a **consistent author identity** across your commits.\n5. Add a `.gitignore` that excludes secrets (`*.env`, `*.pem`, `*.key`, `secrets/`).\n6. Ensure **no secrets** are committed (no private keys or `API_KEY=` literals in the tree).\n\n> The grader performs light history forensics. A single bulk commit is not blocked but is\n> flagged for review; genuine incremental work over time passes cleanly.\n\n## Deliverables\n- A git repository (the assignment repository itself) whose history satisfies the checks.\n- `.gitignore` with secret patterns.\n\n## Submission\nPush all branches and tags: `git push --all && git push --tags`.\nRun `bash autograde/run.sh --syscheck` first to confirm git identity is set.\n\n## Grading\n| Criterion | Points |\n|-----------|-------:|\n| Directory is a git repository | 10 |\n| At least 8 commits | 12 |\n| Commits span >= 2 distinct hours | 8 |\n| Consistent commit author | 8 |\n| Feature branch exists | 12 |\n| A merge commit exists | 12 |\n| At least one tag | 8 |\n| `.gitignore` excludes secret patterns | 15 |\n| No secrets committed to the tree | 15 |\n| **Total** | **100** |\n", "labs/lab-02-git-github-workflow/STUDENT-GUIDE.md": "# Lab 2 Student Guide: Git and GitHub Workflow\n\n**Course:** CSEC 2300 Foundations of Cyber Security (UIW) - Dr. Gonzalo D Parra\n\nThis guide is written for students who have **never used git before**. It explains\nevery word and every command. Take it slowly. You cannot break anything by reading.\n\n---\n\n## What you will build and prove\n\nYou will turn a folder into a tracked project and record your work as a clean,\nprofessional history: several small saves (commits), a side branch that you merge\nback, a version label (tag), and a rule file that keeps secrets (passwords, keys)\nout of the project. The autograder reads your project history and awards points for\neach of these habits. You are proving that you can work the way security teams\nactually work, where every change is reviewed and audited (Course Outcome CO3).\n\n---\n\n## The words you need (read this once)\n\n- **Repository (repo):** a folder that git is watching. It has a hidden `.git`\n  subfolder where the full history lives. \"Being in a repo\" just means you are\n  inside that folder.\n- **Commit:** a saved snapshot of your files, with a short message describing what\n  changed. Think of it as a labeled save point you can always return to. Good work\n  is **many small commits**, not one giant one.\n- **Branch:** a parallel line of work. `main` is the primary branch. You make a\n  `feature/...` branch to try something without disturbing `main`, then combine it\n  back later. It is a safe sandbox.\n- **Merge:** combining one branch's commits into another. When you merge a feature\n  branch into `main`, git records a special **merge commit** that ties the two lines\n  together.\n- **Tag:** a permanent name pinned to one commit, usually a release like `v1.0`. It\n  is a bookmark for \"this is the version we shipped.\"\n- **`.gitignore`:** a plain text file listing patterns for files git should never\n  track (for example `*.key`). This is how you keep passwords and private keys out\n  of the project.\n\nIf any of these still feel abstract, spend fifteen minutes on the two practice\nsites before you touch the graded work. They are the fastest way to make branches\nand merges click:\n\n- https://learngitbranching.js.org/  (drag-and-drop branch and merge visualizer)\n- https://gitmastery.me/  (short guided git exercises)\n\n---\n\n## Before you start\n\n- **Finish Lab 0 first.** Lab 0 sets your git identity (name and email) and your SSH\n  key. This lab assumes both are already done.\n- **Where the real instructions live:** the Lab 2 assignment on Canvas contains the\n  **repository invitation** and the authoritative `README.md`. If a hint here\n  and the README ever disagree, the README wins.\n- **If you get stuck:** open `HINTS.md` in the repo. It has three tiers, from a gentle\n  nudge to a near-complete example. Use the smallest hint that unblocks you.\n- **You are on Windows?** Use **Git Bash** (installed with Git for Windows) for every\n  command below. It gives you the same `bash` shell the commands are written for.\n  Open the Start menu, type \"Git Bash\", and press Enter.\n\n---\n\n## Step 1 - Accept and open the lab\n\n1. Click the **repository invitation** from the Canvas assignment. Accept it.\n   Your instructor creates a private repository for you with the starter files in it.\n   **That repository is already a git repo** - you do not run `git init` yourself.\n2. On your new repo's GitHub page, click the green **Code** button, choose **SSH**,\n   and copy the address (it looks like `git@github.com:...`).\n3. In Git Bash, clone (download) it and step into the folder:\n\n```bash\ngit clone git@github.com:YOUR-ORG/lab-02-git-github-workflow-YOURNAME.git\ncd lab-02-git-github-workflow-YOURNAME\n```\n\n- `git clone <address>` copies the whole repo, history and all, to your computer.\n- `cd <folder>` means \"change directory\" - it moves you inside that folder so the\n  next commands run in the right place.\n\n> **what you'll see:** git prints `Cloning into '...'` and a few lines about objects.\n> After `cd`, your prompt shows the folder name. You are now \"inside the repo.\"\n\n---\n\n## Step 2 - Run the system check first\n\nBefore doing any work, confirm your environment is ready:\n\n```bash\nbash autograde/run.sh --syscheck\n```\n\n- `bash` runs a script. `autograde/run.sh` is the checker script. `--syscheck` tells\n  it to run the pre-flight (environment) checks instead of grading.\n\n> **what you'll see:** a table like this, all rows saying `PASS`:\n\n![syscheck all passing](labs/lab-02-git-github-workflow/guide-assets/lab-02-syscheck.png)\n\nIf any row says **FAIL**, fix it with the hint in that row, then run the command\nagain:\n\n- **git identity configured = FAIL:** you skipped Lab 0. Set it once, globally:\n  ```bash\n  git config --global user.name \"Your Name\"\n  git config --global user.email \"you@example.com\"\n  ```\n- **inside a git repository = FAIL:** you are not inside the cloned folder. Run `cd`\n  into it (see Step 1). Your assignment repository is already a git repo, so you should never need\n  `git init` here.\n- **git installed = FAIL:** install Git for Windows from https://git-scm.com and\n  reopen Git Bash.\n- **starter files intact = FAIL:** you deleted a starter file. Re-clone a fresh copy.\n\nDo not move on until every row is PASS.\n\n---\n\n## Step 3 - Understand what the grader wants\n\nThe grader awards 100 points across nine habits. You are aiming to satisfy all nine:\n\n| What it checks | How you satisfy it |\n|----------------|--------------------|\n| It is a git repo | Automatic (your assignment repo) |\n| At least 8 commits | Make many small commits (Step 4) |\n| Commits span 2+ clock hours | Do the work in real sittings, not one dump (Step 4) |\n| One consistent author | Use the same identity from Lab 0 the whole time |\n| A `feature/...` branch exists | Step 5 |\n| A merge commit exists | Step 6 |\n| At least one tag | Step 7 |\n| `.gitignore` blocks secret patterns | Step 8 |\n| No secrets committed | Step 8 |\n\nYou do not need to memorize this. Just follow Steps 4 through 8.\n\n---\n\n## Step 4 - Do real, incremental work (8+ commits, spread over time)\n\nThe `WORKLOG.md` file exists so you have something real to edit and commit. The\nprofessional habit this teaches is: **make a small change, save it, describe it,**\nrepeat. One giant commit at the end is what the grader flags as suspicious.\n\nThe save loop, three commands you will use over and over:\n\n```bash\ngit add WORKLOG.md\ngit commit -m \"docs: note what I just changed\"\ngit status\n```\n\n**Anatomy of each command:**\n\n- `git add <file>` - **stage** the file. Staging means \"include this change in my\n  next commit.\" You are choosing what goes into the snapshot.\n- `git commit -m \"message\"` - **save** the staged changes as one commit. The `-m`\n  flag attaches the message inline. Write it as `type: short summary`, for example\n  `docs:`, `feat:` (a feature), `chore:` (housekeeping). Present tense, under ~60\n  characters.\n- `git status` - **show** what is staged, unstaged, or untracked. Run it whenever you\n  are unsure what state you are in. It is safe and read-only.\n\n> **what you'll see** after a commit: a line like\n> `[main a1b2c3d] docs: note what I just changed` and `1 file changed`.\n\n**Reaching 8 commits over 2+ hours the honest way:** genuinely spread the lab across\nat least two sittings in different clock hours (for example some work before lunch,\nsome after). Add a real line to `WORKLOG.md` each time you make a meaningful change,\nthen commit it. Eight to ten small commits is a normal, healthy history for this lab.\nDo not fake timestamps; do the work in real sessions and the \"2 distinct hours\" check\ntakes care of itself.\n\nTo see your history at any time:\n\n```bash\ngit log --oneline\n```\n\n> **what you'll see:** one line per commit, newest at top, each with a short id and\n> your message. This is your project's story.\n\n---\n\n## Step 5 - Create a feature branch and work on it\n\nYou will move risky or experimental work onto a side branch so `main` stays clean.\n\n```bash\ngit switch -c feature/secrets-hygiene\n```\n\n- `git switch -c <name>` - **create** a new branch and move onto it in one step. The\n  `-c` means \"create.\" The name must start with `feature/` for the grader to see it.\n  Everything you commit now lands on this branch, not on `main`.\n\nMake a couple of real commits here. For example, add a small file that reads\nconfiguration from the environment instead of from a committed file, and commit it,\nthen add a short `SECURITY.md` note and commit that too. Use the same add/commit loop\nfrom Step 4. Two or three commits on the branch is plenty.\n\nCheck which branch you are on any time:\n\n```bash\ngit branch\n```\n\n> **what you'll see:** a list of branches with a `*` next to the one you are on.\n\n---\n\n## Step 6 - Merge the feature branch back into main\n\nNow combine your branch's work into `main` and record the merge.\n\n```bash\ngit switch main\ngit merge --no-ff feature/secrets-hygiene -m \"merge: integrate secrets-hygiene into main\"\n```\n\n- `git switch main` - move back onto the `main` branch. (No `-c` this time, because\n  `main` already exists.)\n- `git merge --no-ff <branch>` - pull the branch's commits into `main`. The\n  `--no-ff` flag (\"no fast-forward\") **forces git to record a real merge commit** so\n  the history clearly shows a branch was merged. This is exactly what the grader\n  looks for. `-m` gives the merge commit its message.\n\n> **what you'll see:** `Merge made by the 'recursive' strategy` (or similar) and a\n> summary of the files that came over from the branch.\n\n**Avoiding a merge conflict:** a conflict happens when both branches changed the\n**same lines** of the same file. To sidestep it in this lab, edit `WORKLOG.md` only\non `main`, and have your feature branch add **new** files instead. If a conflict does\nhappen, git marks the spots with `<<<<<<<`, `=======`, `>>>>>>>`. Open the file,\ndelete those marker lines and keep the text you want, then `git add` the file and\n`git commit` to finish the merge. Never leave marker lines in a committed file.\n\nKeep the feature branch after merging (do not delete it) so the grader can still see\nit existed.\n\n---\n\n## Step 7 - Tag a release\n\nA tag pins a friendly name to the current commit.\n\n```bash\ngit tag -a v1.0 -m \"release v1.0: clean workflow with secrets hygiene\"\n```\n\n- `git tag -a <name>` - create an **annotated** tag (the `-a`), which stores who made\n  it and when. Plain lightweight tags work too, but annotated is the professional\n  default. `-m` is the tag's message.\n\nConfirm it:\n\n```bash\ngit tag\n```\n\n> **what you'll see:** `v1.0` printed on its own line.\n\n---\n\n## Step 8 - Secrets hygiene (this is graded twice)\n\nTwo rules: (a) your `.gitignore` must list secret patterns, and (b) no actual secret\nmay be sitting in the project where the scanner walks the folder.\n\n**(a) Edit `.gitignore`** so it includes these patterns (see `HINTS.md` Tier 3 for the\nexact block). A `.gitignore` line like `*.key` means \"never track any file ending in\n`.key`.\" Your file should cover at least env files, PEM files, key files, and a\n`secrets/` folder. Then commit it:\n\n```bash\ngit add .gitignore\ngit commit -m \"chore: add secret patterns to .gitignore\"\n```\n\n**(b) Never put a real secret in the folder.** If you create a local credentials file\nto test with, keep it inside the git-ignored `secrets/` folder and fill it with\nplaceholder text, not a real key. Confirm git is ignoring it:\n\n```bash\ngit check-ignore secrets/service.env\ngit status\n```\n\n- `git check-ignore <path>` prints the path back if it is being ignored (silence\n  means it is **not** ignored - fix your `.gitignore`).\n- `git status` should **not** list your secret file under changes to commit. If it\n  does, it is not ignored yet.\n\n> **Why this matters:** committed private keys and API keys are one of the most common\n> real-world breaches. The grader scans your project folder for private-key blocks and\n> `API_KEY=sk-...` style literals. Keep them out entirely, even in ignored files, and\n> use harmless placeholders when you need an example.\n\n---\n\n## Final step - Validate and capture your proof\n\nRun the full grader:\n\n```bash\nbash autograde/run.sh\n```\n\n> **what you'll see:** a JSON report listing each criterion with its points, then a\n> total, then two codes on their own lines: **WORK-FP** and **ATTEST**. A finished run\n> looks like this:\n\n![completed validation showing 100 out of 100 with WORK-FP and ATTEST](labs/lab-02-git-github-workflow/guide-assets/lab-02-completion.png)\n\nRead the per-criterion `feedback` lines. Any criterion scoring below its max tells you\nexactly what to fix; go back to the matching step above, fix it, and run the grader\nagain. Repeat until `\"total\": 100`.\n\n**Capture your proof:** take a screenshot of the terminal showing the final score and\nthe **WORK-FP** and **ATTEST** lines. That screenshot is what you submit. On Windows,\npress `Windows + Shift + S` to grab the terminal region.\n\n**Push your work to GitHub** so the online autograder also runs:\n\n```bash\ngit push --all\ngit push --tags\n```\n\n- `git push --all` uploads every branch (`main` and your `feature/...` branch).\n- `git push --tags` uploads your `v1.0` tag. Tags do not go up with `--all`, so this\n  second command is required.\n\n> **what you'll see:** git lists the branches and tags it sent. On your repo's GitHub\n> page, the **Actions** tab will show the autograder running and its score.\n\n---\n\n## Submitting on GitHub (what you will see)\n\nThe same grader that ran on your computer also runs on GitHub, on GitHub's own\nservers, every time you push. This is the copy Dr. Gonzalo D Parra reads for your\ngrade, so it is worth knowing exactly what a passing submission looks like online.\n\n1. **Accept the assignment.** Open the repository invitation for Lab 2 on\n   Canvas and click **Accept this assignment**. GitHub creates a private repository\n   for you and gives you its clone URL. Clone it, do all the work from this guide\n   inside that folder, and commit as you go.\n\n2. **Push every branch and every tag.** A single `git push` sends only your current\n   branch, and tags never travel automatically. Send all of it:\n\n   ```bash\n   git push origin --all\n   git push origin --tags\n   ```\n\n   - `--all` uploads `main` and your `feature/...` branch.\n   - `--tags` uploads your `v1.0` tag. This second command is required; without it\n     the online grader reports **0** for the `tag` and `feature_branch` checks even\n     though they pass on your machine.\n\n3. **Open the Actions tab.** On your repository page on GitHub, click **Actions**.\n   You will see a workflow named **Autograde Lab 2** with a run for your push. A\n   spinning yellow dot means it is still grading; wait for it to finish.\n\n   > **what you'll see:** the run turns into a green check when it passes. Click the\n   > run, then the **grade** job, to read the full per-criterion panel and the\n   > **Autograde: 100/100 points** summary at the top.\n\n4. **Confirm the score matches.** The server prints the very same panel you saw\n   locally, with the identical **WORK-FP** and the same per-criterion points. A\n   finished, passing online run looks like this:\n\n   ![GitHub Actions autograder showing 100 out of 100 server-side with WORK-FP and ATTEST](labs/lab-02-git-github-workflow/guide-assets/lab-02-github-actions.png)\n\n   If the green check shows the same score you captured on your computer, your\n   submission is complete. If the online run is lower, re-read step 2; a missing\n   `git push origin --tags` is the most common cause.\n\n---\n\n## Troubleshooting (the usual stumbles for this lab)\n\n1. **\"time_spread\" scores 0** - all your commits landed in one clock hour, which reads\n   as a single bulk dump. Do the remaining work in a later sitting and add a few more\n   real commits so your history spans at least two hours.\n2. **\"merge_commit\" scores 0** - you merged without `--no-ff`, so git fast-forwarded\n   and left no merge commit. Make a fresh tiny commit on a new `feature/...` branch and\n   merge again **with** `--no-ff`.\n3. **\"feature_branch\" scores 0** - your branch name does not start with `feature/`, or\n   you deleted it after merging. Recreate it as `feature/<name>` and keep it.\n4. **\"gitignore_secrets\" scores 0** - your `.gitignore` is missing the patterns. Open\n   `HINTS.md` Tier 3 and add the exact block, then commit `.gitignore`.\n5. **\"no_secrets\" scores 0** - a file in your folder contains something that looks like\n   a private key or an `API_KEY=sk-...` literal. Replace it with a placeholder or\n   delete it. Ignoring the file is **not** enough; the scanner walks the folder, so the\n   real value must not be present at all.\n6. **\"author_consistency\" scores low** - you committed under two different emails. Set\n   your identity once with `git config --global user.email \"...\"` and use it for all\n   commits.\n", "labs/lab-02-git-github-workflow/WORKLOG.md": "# Work Log\n\nUse this file to make real commits as you practice the workflow.\nAdd a line here for each meaningful change, then commit it.\n\n- (example) initialized project\n", "labs/lab-03-ci-devsecops/HINTS.md": "# Lab 3 - Hints (three tiers)\n\n## Task group A - Workflow scaffolding\n- **Tier 1 (nudge):** A workflow is YAML under `.github/workflows/`. Start here: https://docs.github.com/en/actions/writing-workflows/quickstart\n- **Tier 2 (guided):** Give it `on: [push, pull_request]` and one `jobs.security` block `runs-on: ubuntu-latest` with sequential steps.\n- **Tier 3 (near-solution):**\n  ```\n  name: ci\n  on: [push, pull_request]\n  jobs:\n    security:\n      runs-on: ubuntu-latest\n      steps:\n        - uses: actions/checkout@v4\n        - name: lint\n          run: pipx run ruff check . || true\n        - name: secret scan\n          uses: gitleaks/gitleaks-action@v2\n        - name: dependency audit\n          run: pipx run pip-audit || true\n  ```\n\n## Task group B - Secret & dependency scanning\n- **Tier 1 (nudge):** Secret scanners look for high-entropy strings and known key formats. https://github.com/gitleaks/gitleaks  ·  https://pypi.org/project/pip-audit/\n- **Tier 2 (guided):** Use the `gitleaks/gitleaks-action@v2` action; run `pip-audit` (Python) or `npm audit` (Node) for dependencies.\n- **Tier 3 (near-solution):** See the `secret scan` and `dependency audit` steps in the Tier-3 snippet above.\n\n## Task group C - Fix the seeded secret\n- **Tier 1 (nudge):** `starter/app/config.py` contains a hardcoded API key. Secrets belong in environment variables, never in source. https://12factor.net/config\n- **Tier 2 (guided):** Replace the literal with `os.environ.get(\"API_KEY\")` and add `.env` to `.gitignore`.\n- **Tier 3 (near-solution):**\n  ```\n  import os\n  API_KEY = os.environ.get(\"API_KEY\", \"\")   # was: API_KEY = \"sk-live-....\"\n  ```\n", "labs/lab-03-ci-devsecops/README.md": "# Lab 3: CI / DevSecOps Pipeline\n\n**Course:** CSEC 2300-01 Foundations of Cyber Security (UIW) - Dr. Gonzalo D Parra\n**Points:** 100  ·  **Estimated time:** 100 min  ·  **Autograding:** workflow-file + secret-removal checks\n\n## Objective\nBuild a GitHub Actions pipeline that runs a **linter**, a **secret scan**\n(gitleaks-style), and a **dependency audit** - then fix a *seeded leaked secret*\nalready committed in `starter/app/config.py` and update `.gitignore`.\n\n**Why it matters:** shifting security left into CI catches vulnerabilities and\nleaked secrets before they ship (CO2).\n\n## Course-Outcome Mapping\n| Outcome | Evidence |\n|---------|----------|\n| CO2 - Mitigation & deterrent techniques for attacks/vulnerabilities | Automated SAST/secret/dependency gates in CI |\n| CO6 - Security+ readiness | Domain 2.0 (Threats/Vulnerabilities/Mitigations), 4.0 (Security Operations) |\n\n**Security+ SY0-701 domain:** 2.0 Threats, Vulnerabilities & Mitigations; 4.0 Security Operations (automation, CI).\n\n## Prerequisites\n- Lab 2 complete. Basic YAML.\n\n## Tasks\n1. Create `.github/workflows/ci.yml` (a **new** workflow, separate from the autograder).\n2. Add a job/step that runs a **linter** (e.g., `ruff`, `flake8`, `hadolint`, or `eslint`).\n3. Add a step that runs a **secret scanner** (e.g., `gitleaks`).\n4. Add a step that runs a **dependency audit** (e.g., `pip-audit`, `safety`, or `npm audit`).\n5. **Remove the seeded secret** from `starter/app/config.py` (read it from an environment variable instead) and delete any committed `.env`.\n6. Update `.gitignore` to exclude `.env`.\n7. Write a `SECURITY.md` documenting that the leaked key was **rotated/revoked** (the lesson: rotate the secret; do not try to scrub history).\n\n## Deliverables\n- `.github/workflows/ci.yml` with the three security stages.\n- `starter/app/config.py` with the hardcoded key removed; no `.env` in the tree.\n- `.gitignore` excluding `.env`.\n- `SECURITY.md` documenting secret rotation.\n\n## Submission\nPush to your repository. Run locally with `bash autograde/run.sh`.\nRun `bash autograde/run.sh --syscheck` first to confirm your environment.\n\n## Grading\n| Criterion | Points |\n|-----------|-------:|\n| `ci.yml` workflow present | 12 |\n| Linter step present | 13 |\n| Secret-scan step present (gitleaks) | 18 |\n| Dependency-audit step present | 12 |\n| Seeded secret removed from repo (HEAD) | 20 |\n| `.gitignore` excludes `.env` | 10 |\n| `SECURITY.md` documents rotation | 15 |\n| **Total** | **100** |\n", "labs/lab-03-ci-devsecops/STUDENT-GUIDE.md": "# Lab 3 Student Guide: CI / DevSecOps Pipeline\n\nCourse: CSEC 2300-01 Foundations of Cyber Security (UIW) - Dr. Gonzalo D Parra\n\n## What you will build and prove\n\nYou will build an automated **security pipeline** that runs every time code is\npushed to GitHub. It runs three checks: a **linter**, a **secret scanner**, and\na **dependency audit**. You will also fix a real problem the starter code has:\nan API key was accidentally committed to the repository. You will remove it,\ntell git to ignore secret files going forward, and write a short security note\nexplaining that the leaked key was rotated (replaced), not just deleted.\n\nWhen you finish, `bash autograde/run.sh` should show **100/100** with a\nWORK-FP and ATTEST code, which is the proof you submit.\n\n## Before you start\n\n- Finish Lab 2 first. You should be comfortable with `git add`, `git commit`,\n  and `git push`.\n- The authoritative instructions live in the **Lab 3 assignment on Canvas**:\n  the repository invitation and the `README.md` in your repository.\n- If you get stuck, open `HINTS.md`. It has a three-tier hint ladder (a nudge,\n  then guided help, then a near-solution). Use the smallest hint that unblocks\n  you.\n- This guide teaches you the **process and the tools**. It does not hand you\n  the graded answers. That is on purpose. You learn security by doing it.\n\n### A one-minute vocabulary primer\n\n- **CI (Continuous Integration):** a robot that automatically runs checks on\n  your code every time you push. Instead of you remembering to run tests, the\n  server does it for you and reports back pass or fail.\n- **DevSecOps:** the practice of building security checks **into** that robot,\n  so problems are caught automatically as part of normal development. People\n  call this \"shifting security left\" (catching issues early, on the left side\n  of the timeline, instead of after shipping).\n- **GitHub Actions:** GitHub's built-in CI robot. You tell it what to do by\n  writing a **workflow file** (a `.yml` file) inside `.github/workflows/`.\n- **Workflow file:** a plain-text recipe, written in YAML, that lists the\n  steps the robot should run.\n\n## Step 1: Accept and open the lab\n\n1. Click the repository invitation from Canvas and accept the\n   assignment. GitHub creates a private repository just for you.\n2. Copy the repository's clone URL (the green **Code** button on the repo page).\n3. On your computer, open a terminal (on Windows, use **Git Bash**, which was\n   installed with Git) and run:\n\n   ```bash\n   git clone <the-URL-you-copied>\n   cd lab-03-ci-devsecops\n   ```\n\n   > What you'll see: git downloads the files and drops you into the lab folder.\n   > Run `ls` (or `dir`) and you should see `README.md`, `autograde/`, and a\n   > `starter/` folder.\n\n## Step 2: Run the system check first\n\nBefore doing any work, confirm your environment is ready:\n\n```bash\nbash autograde/run.sh --syscheck\n```\n\n> What you'll see:\n\n![syscheck panel](labs/lab-03-ci-devsecops/guide-assets/lab-03-syscheck.png)\n\nEvery row should say **PASS**. If a row says FAIL, the last column tells you\nhow to fix it:\n\n| If this FAILs | Do this |\n|---|---|\n| `python3 available` | Install Python 3 and reopen your terminal so it is on your PATH. |\n| `git installed` | Install Git for Windows (Git Bash) and reopen the terminal. |\n| `starter files intact` | You deleted a starter file by accident. Restore it with `git checkout -- starter/app/config.py`. |\n\nThis lab needs only Python and Git. No Docker required.\n\n## Step 3: Understand the problem you are fixing\n\nOpen `starter/app/config.py`. You will see a line that hardcodes an API key\ndirectly in the source, plus a stray `.env` file that also holds the key.\n**This is the bug.** A secret written into source code gets copied to every\nclone, every fork, and GitHub's servers. Anyone who can read the repo can read\nthe key.\n\nThe rule: **secrets never belong in source code.** They belong in\n**environment variables** or an encrypted secret store, read in at run time.\n\n## Step 4: Write the CI workflow\n\nCreate a new file at `.github/workflows/ci.yml`. This is separate from the\n`classroom.yml` autograder that is already there. Do not edit `classroom.yml`.\n\nA workflow file has a few required parts. Here is the shape (see `HINTS.md`\nTier 3 for the specific step contents you need):\n\n```yaml\nname: ci\non: [push, pull_request]      # WHEN the robot runs\njobs:\n  security:                   # a named job\n    runs-on: ubuntu-latest    # WHICH machine it runs on\n    steps:                    # WHAT it does, top to bottom\n      - uses: actions/checkout@v4      # step that uses a prebuilt action\n      - name: lint\n        run: <a shell command>         # step that runs a shell command\n```\n\nHow to read that structure:\n\n- **`on:`** is the trigger. `[push, pull_request]` means \"run on every push and\n  on every pull request.\"\n- **`jobs:`** holds one or more jobs. Each job runs on a fresh cloud machine.\n- **`runs-on:`** picks the machine image. `ubuntu-latest` is a standard Linux\n  runner GitHub provides for free.\n- **`steps:`** is an ordered list. Each step is either `uses:` (run a prebuilt\n  action someone else published) or `run:` (run a shell command). Steps run\n  top to bottom; if one fails, the run turns red.\n\nYou must include three security steps:\n\n1. **Linter** (for example `ruff`, `flake8`, `hadolint`, or `eslint`). A linter\n   reads your code without running it and flags style problems, likely bugs,\n   and suspicious patterns. This is a light form of **SAST** (Static\n   Application Security Testing).\n2. **Secret scanner** (`gitleaks`). It searches your files and git history for\n   things that look like passwords, tokens, and API keys, using known key\n   formats and high-entropy (random-looking) string detection. This is the\n   check that would have caught the seeded key.\n3. **Dependency audit** (`pip-audit`, `npm audit`, or `safety`). It reads your\n   dependency list and cross-references it against a database of known\n   vulnerabilities (CVEs) in those exact versions. Old libraries often have\n   published security holes; this tells you which ones to upgrade.\n\n> What you'll see when these actually run (this lab's steps run cleanly on your\n> own machine too):\n>\n> ```\n> Lint (ruff):            All checks passed!\n> Dependency audit:       Found 5 known vulnerabilities in 2 packages\n>                         requests 2.31.0 ... flask 2.0.0 ...\n> ```\n>\n> The dependency audit finding is expected. The starter pins deliberately old\n> versions so you can see what a real vulnerability report looks like. Your job\n> for this lab is to have the audit **run**, not to reach zero findings.\n\n## Step 5: Remove the seeded secret\n\n1. Edit `starter/app/config.py` so the key is read from an environment variable\n   instead of being written in the file. `HINTS.md` Tier 3 shows the exact\n   one-liner. The idea: `os.environ.get(\"API_KEY\", \"\")`.\n2. Delete the committed `.env` file and tell git about the deletion:\n\n   ```bash\n   git rm .env\n   ```\n\n   > What you'll see: `rm '.env'`. The file is now staged for deletion.\n\n3. Confirm the secret is truly gone from your working files:\n\n   ```bash\n   grep -rl \"sk-live\" . --exclude-dir=.git --exclude-dir=autograde\n   ```\n\n   > What you'll see: nothing at all. No output means no match, which is what\n   > you want. (The grader ignores the `autograde/` folder, so a copy of the\n   > pattern living inside the grader itself does not count against you.)\n\n## Step 6: Stop it from happening again (.gitignore)\n\nOpen `.gitignore` and add a line with `.env` on it. `.gitignore` is a list of\nfile patterns git should never track. With `.env` listed, git will refuse to\nstage a future `.env`, so a teammate cannot re-commit the same mistake.\n\n## Step 7: Write SECURITY.md\n\nCreate a file named `SECURITY.md` in the repo root. In plain language, document\nthat the leaked key was **rotated / revoked** (turned off at the provider and\nreplaced with a new one). Explain **why rotation is the real fix** and why you\ndid **not** try to scrub git history.\n\nThe key lesson: once a secret has been pushed to a shared server, assume it is\ncompromised forever. Deleting it from the latest commit does not un-leak it,\nbecause old clones and caches still have it. The only thing that actually\nprotects you is **making the old key worthless** by rotating it. Use words like\n*rotate*, *revoke*, *re-issue*, or *invalidate* so it is clear you understand\nthis.\n\n## Final step: Validate and capture your proof\n\nRun the grader:\n\n```bash\nbash autograde/run.sh\n```\n\nRead the per-criterion table. Each line shows points earned out of the max and\na short reason. Aim for **100/100**. When you get there, you will see your\n**WORK-FP** and **ATTEST** codes at the bottom. Take a screenshot of this whole\nresult (the score block plus both codes) and submit it as directed on Canvas.\n\n> A finished run looks like this:\n\n![completion panel showing 100 out of 100](labs/lab-03-ci-devsecops/guide-assets/lab-03-completion.png)\n\n### Red run vs green run on GitHub\n\nAfter you `git push`, open your repository on GitHub and click the **Actions**\ntab. Each push shows a run:\n\n- A **green check** means every step passed. Your pipeline is healthy.\n- A **red X** means a step failed. Click the run, then click the failed step to\n  expand its log. The log reads top to bottom; scroll to the first red error\n  line. For example, if the secret scanner turns the run red, its log will name\n  the file and line where it found a key, exactly like this local preview:\n\n  ```\n  .env:2:API_KEY=sk-live-...        <- a RED run: the scanner found a secret\n  starter/app/config.py:5:API_KEY = \"sk-live-...\"\n  ```\n\n  Fix the reported problem, commit, and push again. The pipeline re-runs\n  automatically and should go green.\n\n> Note: the live GitHub Actions run is graded separately and needs your pushed\n> repository. The `bash autograde/run.sh` score above is the local proof you\n> submit. Both come from the same three security gates.\n\n## Submitting on GitHub (what you will see)\n\nThe local `bash autograde/run.sh` score is your offline proof. When you push to\nyour a private GitHub repository repository, GitHub runs the checks again on its own\nservers, and you can watch them live. Two separate workflows run on every push:\n\n1. **The autograder** (`classroom.yml`, named \"Autograde Lab 3\"). This is the\n   graded pipeline your instructor sees. It runs the same `autograde/run.sh` and\n   posts your score.\n2. **Your own pipeline** (`ci.yml`, named \"ci\"). This is the DevSecOps pipeline\n   you built: the linter, the secret scan, and the dependency audit.\n\n### Step by step\n\n1. **Push your work.**\n\n   ```bash\n   git add -A\n   git commit -m \"Complete Lab 3: CI pipeline + secret rotation\"\n   git push\n   ```\n\n2. **Open the Actions tab.** On your repository page on GitHub, click\n   **Actions**. You will see your push listed with **both** workflows running.\n   A spinning amber dot means \"in progress\"; a green check means \"passed\"; a red\n   X means \"a step failed\".\n\n3. **Wait for both to go green.** Give it a minute. Both \"Autograde Lab 3\" and\n   \"ci\" should finish with a green check.\n\n   - If your **ci** pipeline is red, click it, open the red step, and read the\n     first error. A common cause is a linter finding in your app code, or a\n     secret the scanner detected in what you shipped. Fix it, commit, and push\n     again; the run repeats automatically.\n   - If the **autograder** is red or below 100, open its run and read the job\n     summary (next step) to see which criterion missed.\n\n4. **Read your score in the job summary.** Click the **Autograde Lab 3** run,\n   then click the **Summary** at the top left. GitHub prints a table:\n   `Autograde: 100/100 points`, one line per criterion, and your **WORK-FP** and\n   **ATTEST** codes. That summary is the server-side proof of your grade.\n\n> What a finished submission looks like: both workflows green, and the\n> autograder reporting a perfect score with its verification codes.\n\n![Lab 03 GitHub Actions autograder and CI both passed](labs/lab-03-ci-devsecops/guide-assets/lab-03-github-actions.png)\n\nNote: the secret scanner in your `ci` pipeline checks the files you actually\nship (your current HEAD), which is clean once you have removed the key. The old\nleaked commit stays in history on purpose. The real protection is that the key\nwas **rotated**, as you documented in `SECURITY.md`. That is why the pipeline\ncan pass while the history still records what happened. This is the whole\nlesson of the lab, straight from Dr. Gonzalo D Parra: rotate the secret, do not\ntry to scrub history.\n\n## Troubleshooting\n\n1. **Grader says \"no CI workflow found.\"** Your file must be at exactly\n   `.github/workflows/ci.yml`. Check spelling and that it is not inside\n   `starter/`. The folder starts with a dot.\n2. **Grader still says the secret is present.** You edited `config.py` but did\n   not delete `.env`, or the other way around. The key lives in both. Run the\n   `grep` from Step 5 to find every remaining copy.\n3. **Linter / secret-scan / dep-audit step \"not detected.\"** The grader looks\n   for the tool names in your workflow text (for example `ruff`, `gitleaks`,\n   `pip-audit`). If you used a different tool, make sure it is one of the\n   accepted names listed in the `README.md` grading section.\n4. **`.gitignore` credit but you did not add `.env`.** Do not rely on the\n   starter's TODO comment. Add a real `.env` line so a future `.env` is\n   actually ignored. This is the point of the task.\n5. **YAML errors on GitHub (red run before any step logs).** YAML is\n   indentation-sensitive. Use spaces, never tabs, and keep the two-space\n   indentation consistent. Paste your file into GitHub's Actions tab error\n   message to see the line it complains about.\n", "labs/lab-04-docker-hardening/HINTS.md": "# Lab 4 - Hints (three tiers)\n\n## Task group A - Base image & size\n- **Tier 1 (nudge):** `latest` is a moving target and full base images ship things you do not need. https://docs.docker.com/develop/develop-images/instructions/\n- **Tier 2 (guided):** Pin to a specific slim tag such as `python:3.12-slim` or a digest. Distroless is even smaller.\n- **Tier 3 (near-solution):**\n  ```\n  FROM python:3.12-slim@sha256:____   # or at least python:3.12-slim, never :latest\n  ```\n\n## Task group B - Non-root user & secrets\n- **Tier 1 (nudge):** Containers run as root by default; drop privilege. Secrets in `ENV` end up in image layers. https://docs.docker.com/engine/security/\n- **Tier 2 (guided):** `RUN adduser` then `USER appuser`. Delete `ENV API_KEY=...`; pass secrets with `--env` or a mounted secret at runtime.\n- **Tier 3 (near-solution):**\n  ```\n  RUN useradd --create-home --uid 10001 appuser\n  USER appuser\n  # remove:  ENV API_KEY=... / ENV DB_PASSWORD=...\n  ```\n\n## Task group C - Health check & build\n- **Tier 1 (nudge):** Orchestrators need a signal that the app is alive. https://docs.docker.com/reference/dockerfile/#healthcheck\n- **Tier 2 (guided):** Add `HEALTHCHECK` that curls or execs a liveness probe. Verify UID with `docker run --rm img id -u` (should not be 0).\n- **Tier 3 (near-solution):**\n  ```\n  HEALTHCHECK --interval=30s --timeout=3s CMD ____ || exit 1\n  ```\n", "labs/lab-04-docker-hardening/README.md": "# Lab 4: Docker Hardening\n\n**Course:** CSEC 2300-01 Foundations of Cyber Security (UIW) - Dr. Gonzalo D Parra\n**Points:** 100  ·  **Estimated time:** 90 min  ·  **Autograding:** Dockerfile parse (+ optional build/inspect)\n\n## Objective\nTake the deliberately sloppy `Dockerfile` in this repo (runs as **root**, uses\n`:latest`, bakes **secrets** into `ENV`, huge base image, no health check) and\nharden it: non-root `USER`, a **pinned slim** base, no secrets, and a\n`HEALTHCHECK`.\n\n**Why it matters:** container images are production attack surface. Least\nprivilege and reproducible, minimal images reduce blast radius (CO1, CO2).\n\n## Course-Outcome Mapping\n| Outcome | Evidence |\n|---------|----------|\n| CO1 - Basic concepts of information systems security | Least privilege, minimal trusted base |\n| CO2 - Mitigation & deterrent techniques | Drop root, pin versions, remove embedded secrets |\n| CO6 - Security+ readiness | Domain 3.0 Security Architecture (secure baselines, containers) |\n\n**Security+ SY0-701 domain:** 3.0 Security Architecture (secure baselines, virtualization/containers).\n\n## Prerequisites\n- Docker installed (optional for full grade; the grader still parses the Dockerfile without Docker).\n\n## Tasks\n1. Pin the base image to a specific **slim** tag or digest (no `:latest`).\n2. Create and switch to a **non-root** user with a `USER` directive.\n3. Remove all secrets from `ENV`/`ARG`; read them at runtime instead.\n4. Add a `HEALTHCHECK` instruction.\n5. Prefer `COPY` over `ADD`; do not run privileged installs you do not need.\n6. (Optional, if Docker present) Build and confirm the container runs as a non-root UID.\n\n## Deliverables\n- A hardened `Dockerfile` at the repo root.\n\n## Submission\nPush to your repository. Run locally with `bash autograde/run.sh`.\nRun `bash autograde/run.sh --syscheck` first to confirm the Docker daemon is reachable.\n\n## Gr
