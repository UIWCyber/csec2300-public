d hashes. An attacker steals the whole table. What can they NOT do directly, and what does the salt specifically defeat?\n- **M5.3** You verify a signature on a message using your colleague's public key and it checks out. State the two properties you have established.\n- **M5.4** A site's certificate is valid, unexpired, and chains to a trusted root, but the name on it does not match the domain you typed. Should the browser trust it? Why?\n- **M5.5** A system requires a password plus a code from a hardware token. A second system requires a password plus a security question. Which one is MFA, and why?\n\n---\n\n## Exam-day logistics\n\n- **Format:** 40 questions, each worth one point: mostly multiple choice, plus a few true/false and two multiple-answer (\"select all that apply\") items. On multiple-answer items, read every option; partial patterns from the stem are not enough.\n- **Coverage:** 8 questions per module, M1 through M5, drawn from lecture, labs, and quizzes 1 through 5.\n- **Delivery:** taken in class on Canvas during the exam window posted on Canvas. Bring your laptop charged and your Canvas login working before exam day.\n- **Policy:** per the course policy, no late or makeup exams; a missed exam is a zero. For a documented emergency, contact Dr. Gonzalo D Parra before the exam window.\n- **Best preparation:** your quiz results (quizzes 1 through 5 preview the style), your lab repos, and the self-checks above.\n\n---\n\n## Self-check answers\n\n**M1.1** The junk-traffic outage attacks availability; the emailed diagnoses violate confidentiality.\n**M1.2** Sign: deterrent. Locked door: preventive (and physical by category). Nightly backup: corrective (it enables recovery after damage).\n**M1.3** A compensating control: it substitutes alternative protection because patching, the intended control, cannot be applied here.\n**M1.4** Malicious insider; motivation is revenge or grievance, and insiders are dangerous because they start with legitimate access and knowledge.\n**M1.5** Respond (planning response communications and roles); the exercise of preparing plans in advance also touches Govern and Identify, but the plan itself belongs to Respond.\n\n**M2.1** They skipped `git add`. Commits record only what is staged; `git add` moves changes from the working directory into the staging area.\n**M2.2** The key is still in the repository history; anyone with clone access can check out the earlier commit. You should have revoked and rotated the key immediately and treated it as compromised, then cleaned history.\n**M2.3** Create branch, push branch, open PR, review, merge.\n**M2.4** Forged authorship: an attacker impersonating a trusted developer's commits. Signatures bind each commit to a verified cryptographic identity.\n**M2.5** Program: `git`. Subcommand: `commit`. Option: `-m`. Option's argument: the message string `\"add tests\"`.\n\n**M3.1** The gate should fail and the merge should be blocked until the dependency is fixed or replaced. Logging and merging defeats the purpose of a gate: the vulnerability ships to the protected branch and inherits all downstream trust.\n**M3.2** Scanners match known patterns; humans catch logic flaws, malicious intent, and design errors. Automated scanning and human review are complementary layers, not substitutes.\n**M3.3** Pin to a full commit SHA, for example `some-org/build-tool@<40-hex-sha>`. This removes the risk that a compromised or malicious update to the action is silently pulled into your pipeline.\n**M3.4** The retrospective improves the team's process; the review demonstrates the completed increment for stakeholders. Retrospective is about how you work, review is about what you built.\n**M3.5** The SBOM tells you today, immediately, whether the newly announced vulnerable component is inside your software and where. A pen test report is a snapshot of past findings and says nothing about a component disclosed after it was written.\n\n**M4.1** Namespaces isolate what a process can see (its view of processes, network, filesystem, users); cgroups limit what it can consume (CPU, memory, IO).\n**M4.2** Whoever controls the socket controls the Docker daemon: the container could start a privileged container and take over the host. It is effectively granting root on the host.\n**M4.3** Update the base image (or the affected package versions) in the Dockerfile; rebuild and rescan the image; redeploy new containers and retire the old ones. Never patch running containers in place.\n**M4.4** `5000` is the host port, `80` is the container port; the final argument `myapi:2.1` names the image (and tag) the container is created from.\n**M4.5** All containers on a host share that host's kernel, so one kernel exploit reaches them all. Each VM has its own guest kernel behind the hypervisor, so the same exploit is confined to one VM.\n\n**M5.1** Symmetric is fast enough for bulk data but cannot solve key distribution alone; asymmetric handles key distribution and authentication but is slow. The hybrid uses asymmetric to establish a shared session key, then symmetric for everything after.\n**M5.2** They cannot reverse the hashes to recover the passwords, because hashing is one-way. The salt defeats precomputed (rainbow) tables and makes identical passwords hash differently, forcing per-account cracking.\n**M5.3** Authenticity: the message was produced by the holder of that private key. Integrity: it has not been altered since signing. Together these support non-repudiation.\n**M5.4** No. The certificate binds a key to a specific name; a name mismatch means the CA never vouched for this site under that name, which is exactly the pattern of an impersonation or man-in-the-middle attempt.\n**M5.5** The first: password (know) plus hardware token (have) are different factor categories. Password plus security question is two of the same category (both something you know), so it is not MFA.\n", "capstone/README.md": "# Capstone Document Pack\n\n**CSEC 2300 Foundations of Cyber Security** | Instructor: Dr. Gonzalo D Parra\n\nThe capstone is a semester-long team project: build, harden, and document a **secure local-AI stack** (Dockerized Ollama + Open WebUI + an AI agent) delivered through a security-gated CI pipeline, in a GitHub repository with a Project board and a Wiki final report. Full guidelines and grading weights are in the course outline (sections 5.1 and 5.2); all deadlines are posted on Canvas, and no late work is accepted.\n\n**These are the files to upload to Canvas** (each is self-contained and printable):\n\n| Document | Purpose |\n|----------|---------|\n| [team-formation-guide.md](team-formation-guide.md) | How to form a team of 2 to 3 (no solo work), compare schedules before committing, split roles fairly, and what to do if a team falls apart. |\n| [proposal-template.md](proposal-template.md) | The fill-in template teams submit for instructor approval: roster and availability, stack configuration, target controls mapped to CO1 through CO6 and SY0-701 domains, milestone plan, risks, and signatures. |\n| [readiness-checklist.md](readiness-checklist.md) | The pre-presentation self-audit: CI green on HEAD, hardened containers, TLS, guarded agent, complete docs, board hygiene, and demo dry-run, each with a how-to-verify line. |\n| [presentation-rubric.md](presentation-rubric.md) | The grading rubric for the final presentation: five weighted criteria with excellent, adequate, and missing descriptors, the every-member-speaks rule, and the missed-slot deduction. |\n| [peer-feedback-form.md](peer-feedback-form.md) | The one-page form students complete during classmates' presentations for participation credit: one strength, one gap, one question, and clarity ratings. |\n\n**Suggested posting order on Canvas:** team-formation-guide with the capstone announcement, proposal-template with the Capstone Proposal assignment, readiness-checklist around checkpoint 2, and presentation-rubric plus peer-feedback-form with the presentation schedule.\n", "capstone/peer-feedback-form.md": "# Capstone Peer Feedback Form\n\n**CSEC 2300 Foundations of Cyber Security** | Instructor: Dr. Gonzalo D Parra\n\nFill out one form per presenting team while they present. Submitting these forms counts toward your participation grade. Be specific and constructive: name what you saw, not the people. Feedback goes to the presenting team after grading.\n\n---\n\n**Your name:** ______________________________\n\n**Presenting team:** ______________________________\n\n---\n\n## 1. One Strength\n\nSomething this team did well: a control done right, a sharp demo moment, an honest risk call. Point to a specific moment in the talk.\n\n> _______________________________________________________________\n>\n> _______________________________________________________________\n\n## 2. One Gap\n\nSomething missing, unclear, or that you would harden further. A gap is an observation, not an insult; the best gaps name a specific control or slide.\n\n> _______________________________________________________________\n>\n> _______________________________________________________________\n\n## 3. One Question\n\nA question you would ask this team about their stack, their controls, or a risk they accepted (whether or not you get to ask it in Q&A).\n\n> _______________________________________________________________\n>\n> _______________________________________________________________\n\n## 4. Clarity Ratings\n\nCircle one rating per row. 1 = unclear, 5 = crystal clear.\n\n| Aspect | Rating |\n|--------|--------|\n| Architecture: I could redraw their diagram from memory | 1&nbsp;&nbsp;2&nbsp;&nbsp;3&nbsp;&nbsp;4&nbsp;&nbsp;5 |\n| Controls: I understood what each control does and why it maps where it does | 1&nbsp;&nbsp;2&nbsp;&nbsp;3&nbsp;&nbsp;4&nbsp;&nbsp;5 |\n| Attack story: I understood the attack, the defense, and the residual risk | 1&nbsp;&nbsp;2&nbsp;&nbsp;3&nbsp;&nbsp;4&nbsp;&nbsp;5 |\n| Delivery: pacing, handoffs, and every member's part were easy to follow | 1&nbsp;&nbsp;2&nbsp;&nbsp;3&nbsp;&nbsp;4&nbsp;&nbsp;5 |\n\n## 5. One Idea to Steal (optional)\n\nSomething from this presentation you would use in your own work.\n\n> _______________________________________________________________\n", "capstone/presentation-rubric.md": "# Capstone Presentation Rubric\n\n**CSEC 2300 Foundations of Cyber Security** | Instructor: Dr. Gonzalo D Parra\n\nThe final presentation is worth 5% of your course grade (part of the 15% capstone). Teams present in posted time slots during the scheduled Capstone Presentations sessions (order posted on Canvas). Each team gets roughly ten to twelve minutes: about eight to present plus two or three for Q&A.\n\n**Hard rules:**\n\n- **Every member speaks.** Delivery credit requires a speaking part from each team member.\n- **Missing your slot costs 15%.** Failure to present during the scheduled Capstone Presentations results in an automatic 15% deduction from the team's total capstone grade.\n- **No late work.** The final repo, wiki, and board are due at the posted deadline on Canvas or they score zero.\n- **Demo fallback required.** A recorded demo video must be in the repo. If the live demo fails, you switch to the recording and keep going; a working artifact is not penalized heavily for a failed cable.\n\n## Required Structure (five beats, in order)\n\nEvery team walks the same five beats so scoring stays fair:\n\n1. Architecture diagram plus a live demo of the running stack.\n2. Controls mapped to course outcomes (CO) and SY0-701 domains.\n3. One attack you defended (injection, an exposed service, and so on).\n4. Risks accepted plus the incident-response note.\n5. Lessons learned.\n\n## Scoring Criteria and Weights\n\n| Criterion | Weight |\n|-----------|--------|\n| Architecture and working demo | 25% |\n| Security controls and mapping | 30% |\n| Attack and defense narrative | 20% |\n| Governance artifacts | 15% |\n| Delivery and teamwork | 10% |\n| **Total** | **100%** |\n\n### Architecture and working demo (25%)\n\n- **Excellent**: The stack runs live. Segmentation, TLS at the edge, and containerization are visibly demonstrated, not just claimed. The architecture diagram matches what is actually running.\n- **Adequate**: The stack runs (live or via the required recording) and the diagram is accurate, but one or two hardening features are described rather than shown.\n- **Missing or weak**: No working stack shown live or recorded, the diagram contradicts the deployment, or the stack is a stock install with no evident hardening.\n\n### Security controls and mapping (30%)\n\n- **Excellent**: Each implemented control is named, classified (preventive, detective, or corrective), and mapped to a specific CO and SY0-701 domain. The mapping is correct and the team can defend it under questioning.\n- **Adequate**: Controls are listed and mostly mapped, but some classifications or domain mappings are vague, wrong, or unexplained.\n- **Missing or weak**: Controls are named without mapping, the mapping is copied boilerplate the team cannot explain, or few real controls exist.\n\n### Attack and defense narrative (20%)\n\n- **Excellent**: A real attack is shown against the stack and its mitigation is demonstrated, with honest residual risk stated. \"This injection still partially works; here is our compensating control\" earns full credit. Honest security reasoning outranks a polished demo.\n- **Adequate**: An attack and defense are described credibly but demonstrated only partially, or the residual risk discussion is thin.\n- **Missing or weak**: No concrete attack, a purely hypothetical scenario with no evidence, or claims of perfect security with no residual risk acknowledged.\n\n### Governance artifacts (15%)\n\n- **Excellent**: The risk register, AI-use policy, and incident-response note are complete in the wiki, and the Git history and Project board show steady, distributed work all semester.\n- **Adequate**: Artifacts exist but one is thin or stale, or the board and commit history show bursts rather than steady collaboration.\n- **Missing or weak**: One or more artifacts absent, an empty or stale Project board, or commit history concentrated in a single member.\n\n### Delivery and teamwork (10%)\n\n- **Excellent**: Every member speaks with a substantive part. The talk is clear, hits the five beats in order, lands on time, and the team answers questions directly.\n- **Adequate**: Every member speaks but parts are uneven, timing slips, or answers wander.\n- **Missing or weak**: A member does not speak, the talk runs well over or under time, or questions go unanswered.\n\n## Scoring Sheet (instructor use)\n\n| Criterion | Weight | Score (0 to 100) | Weighted |\n|-----------|--------|------------------|----------|\n| Architecture and working demo | 25% | | |\n| Security controls and mapping | 30% | | |\n| Attack and defense narrative | 20% | | |\n| Governance artifacts | 15% | | |\n| Delivery and teamwork | 10% | | |\n| **Presentation total** | 100% | | |\n\n**Deductions applied:** [ ] Missed scheduled slot (automatic 15% off the team's total capstone grade)\n\n**One strength:**\n\n**One gap:**\n", "capstone/proposal-template.md": "# Capstone Proposal\n\n**CSEC 2300 Foundations of Cyber Security** | Instructor: Dr. Gonzalo D Parra\n\n> Complete every section, replace all bracketed placeholders, and submit through the Capstone Proposal assignment on Canvas by the deadline on the course outline. The proposal is worth 3% of your course grade. No late work is accepted: posted deadline or zero. The instructor must approve this proposal before your team starts building.\n\n---\n\n## 1. Team Roster\n\nTeams are **2 to 3 students**. No solo capstones.\n\n| # | Name | UIW Email | GitHub Username |\n|---|------|-----------|-----------------|\n| 1 | [name] | [email] | [github] |\n| 2 | [name] | [email] | [github] |\n| 3 | [name or \"N/A (team of 2)\"] | [email] | [github] |\n\n**Team name (used for the repo):** [team-name]\n\n### Shared Availability Grid\n\nBefore committing to this team, compare schedules: you will collaborate and learn together all semester, so make sure you share workable meeting times. Mark each block every member can meet with an X.\n\n| Time Block | Mon | Tue | Wed | Thu | Fri | Sat | Sun |\n|------------|-----|-----|-----|-----|-----|-----|-----|\n| Morning (before noon) | | | | | | | |\n| Early afternoon | | | | | | | |\n| Late afternoon | | | | | | | |\n| Evening | | | | | | | |\n\n**Agreed weekly meeting time(s):** [at least one recurring block every member marked]\n\n---\n\n## 2. GitHub Setup\n\n| Item | Value |\n|------|-------|\n| Repository URL | [https://github.com/...] |\n| GitHub Project board URL | [https://github.com/.../projects/...] |\n| Collaborators added | [ ] `gdparra-edu` &nbsp; [ ] `cyberknowledge` |\n| Wiki enabled (final report lives here) | [ ] Yes |\n\n---\n\n## 3. Stack Configuration\n\nThe capstone is a **secure local-AI stack**: Dockerized Ollama + Open WebUI + an AI agent, delivered through a security-gated CI pipeline. State your configuration choices.\n\n| Component | Your Choice | Notes |\n|-----------|-------------|-------|\n| Ollama model(s) and pinned tag(s) | [e.g., a small instruct model, pinned tag, never `:latest`] | [why this model, hardware fit] |\n| Open WebUI version (pinned) | [image tag or digest] | |\n| AI agent framework | [e.g., ADK agent from the labs] | [what the agent does] |\n| Agent tools and scopes | [tools the agent may call, and their limits] | [which tools require a human gate] |\n| Reverse proxy / TLS at the edge | [e.g., Caddy or nginx with a local certificate] | |\n| CI pipeline stages | [lint, secret scan, dependency audit, build] | [tools per stage] |\n| Host environment | [OS, RAM, GPU if any] | [each member's demo machine] |\n\n---\n\n## 4. Target Security Controls\n\nList the controls you commit to implementing. Each control must map to at least one course outcome and one SY0-701 domain. Add rows as needed; a strong proposal targets 6 to 10 controls across at least three domains.\n\nCourse outcomes for reference:\n\n- **CO1**: Describe basic concepts of information systems security, including security technology and principles, software security and trusted platforms, and security management.\n- **CO2**: Select appropriate mitigation and deterrent techniques to address network attacks and vulnerabilities.\n- **CO3**: Describe how access control, identity management and cryptography can be applied to securing a network and managing risk.\n- **CO4**: Identify and analyze privacy and policy issues.\n- **CO5**: Engage in activities that an Information Systems Security specialist would normally carry out in the performance of his/her duties.\n- **CO6**: Understand the concepts and domains needed for acquiring the CompTIA Security+ (SY0-701) certification exam.\n\nSY0-701 domains for reference: 1.0 General Security Concepts, 2.0 Threats, Vulnerabilities, and Mitigations, 3.0 Security Architecture, 4.0 Security Operations, 5.0 Security Program Management and Oversight.\n\n| # | Control | Type (preventive / detective / corrective) | CO | SY0-701 Domain |\n|---|---------|--------------------------------------------|----|----------------|\n| 1 | [e.g., non-root containers with pinned base images] | Preventive | CO2 | 3.0 |\n| 2 | [e.g., network segmentation: Ollama unreachable from the host network] | Preventive | CO2 | 3.0 |\n| 3 | [e.g., TLS termination at the reverse proxy] | Preventive | CO3 | 3.0 |\n| 4 | [e.g., CI secret scanning on every push] | Detective | CO5 | 4.0 |\n| 5 | [e.g., prompt-injection guardrails with output validation on the agent] | Preventive | CO2 | 2.0 |\n| 6 | [e.g., AI-use policy and risk register in the wiki] | Governance | CO4 | 5.0 |\n| 7 | [add more] | | | |\n\n---\n\n## 5. Milestone Plan\n\nAlign your plan to the two graded checkpoints and the presentation dates posted on the course outline. Fill in what your team will have DONE by each milestone.\n\n| Milestone (see course outline for the posted deadline) | Deliverable state your team commits to |\n|---------------------------------------------------------|----------------------------------------|\n| Proposal approved | This document approved; repo, board, and wiki created; collaborators added |\n| **Checkpoint 1** | [e.g., Ollama + Open WebUI running in compose; CI pipeline with lint and secret scan passing; threat model drafted] |\n| **Checkpoint 2** | [e.g., full stack segmented and TLS-fronted; agent scoped, gated, and traced; all CI stages green; governance artifacts drafted in the wiki] |\n| Presentation and final submission | [e.g., all controls implemented and mapped; wiki report complete; demo dry-run done; recorded demo fallback in the repo] |\n\n---\n\n## 6. Roles and Contribution Plan\n\nEvery member must contribute commits all semester; the grader checks contribution spread. Roles can rotate, but name a starting owner per area.\n\n| Area | Starting Owner | Rotation Plan |\n|------|----------------|---------------|\n| Containers and compose | [name] | [e.g., swap after checkpoint 1] |\n| CI pipeline and repo hygiene | [name] | |\n| Agent and guardrails | [name or shared] | |\n| Documentation, wiki, and board | [name or shared] | |\n\n---\n\n## 7. Risks and Assumptions\n\nList what could derail the project and what you assume to be true. Be honest; this section seeds the risk register you will keep in the wiki.\n\n| # | Risk or Assumption | Likelihood (L/M/H) | Impact (L/M/H) | Mitigation or Fallback |\n|---|--------------------|--------------------|----------------|------------------------|\n| 1 | [e.g., demo laptop lacks RAM for the chosen model] | | | [e.g., fall back to a smaller quantized model] |\n| 2 | [e.g., a teammate becomes unavailable] | | | [e.g., shared ownership, talk to the instructor early] |\n| 3 | [add more] | | | |\n\n---\n\n## 8. Approval\n\nBy submitting, every team member affirms they reviewed this proposal and the shared availability grid, and commit to the milestone plan above.\n\n| Team member signatures (typed name and date of signing) |\n|----------------------------------------------------------|\n| [name] |\n| [name] |\n| [name or \"N/A (team of 2)\"] |\n\n**Instructor approval (Dr. Gonzalo D Parra):** ______________________________\n\n**Approval conditions or required changes (instructor use):**\n\n[blank]\n", "capstone/readiness-checklist.md": "# Capstone Readiness Checklist\n\n**CSEC 2300 Foundations of Cyber Security** | Instructor: Dr. Gonzalo D Parra\n\nRun this self-audit before presentation day. Score each item GREEN (verified), YELLOW (partial), or RED (missing). Yellows and reds become your final-sprint task list. This checklist mirrors the grading criteria: fix anything that is both a rubric line and currently red before you polish anything else. Final deliverables are due at the posted deadline on Canvas; no late work is accepted.\n\n## Pipeline and Repository\n\n- [ ] **CI is green on HEAD.** The latest commit on your default branch passes every pipeline stage: lint, secret scan, and dependency audit.\n  - *How to verify:* open the Actions tab for your latest commit, or run `gh run list --limit 1` and confirm the conclusion is success. The workflow must include a linter (such as ruff or hadolint), a secret scanner (such as gitleaks or trufflehog), and a dependency audit (such as pip-audit or osv-scanner).\n- [ ] **No committed secrets.** No private keys, API keys, or tokens anywhere in the tree or history.\n  - *How to verify:* run `gitleaks detect --source .` (or your CI secret scanner locally) and confirm zero findings. Secrets belong in files excluded by `.gitignore` or in Docker secrets, never in compose `environment:` blocks.\n- [ ] **Repo hygiene is done.** Branch protection on the default branch, signed commits, `gdparra-edu` and `cyberknowledge` added as collaborators, and a README that describes the system.\n  - *How to verify:* Settings > Branches shows a protection rule; `git log --show-signature -5` shows verified signatures; Settings > Collaborators lists both accounts.\n- [ ] **Contribution spread is real.** Commits come from every team member across the semester, not one author or one weekend.\n  - *How to verify:* run `git shortlog -sne` and confirm every member appears with a meaningful count.\n\n## Containers and Network\n\n- [ ] **Dockerfile is hardened.** Non-root `USER`, a `HEALTHCHECK`, and a pinned base image (a version tag or digest, never `:latest`).\n  - *How to verify:* run `grep -E '^(USER|HEALTHCHECK|FROM)' Dockerfile` and inspect: the last USER is not root, HEALTHCHECK exists, and every FROM is pinned.\n- [ ] **Compose is isolated and pinned.** Every image pinned (no `:latest`), resource limits set, and the Ollama port NOT published to the host; only the reverse proxy is exposed.\n  - *How to verify:* run `grep -nE 'image:|ports:|mem_limit|cpus:' docker-compose.yml`. Ollama must have no `ports:` mapping; services talk over an internal compose network. Then `docker compose config` to confirm it parses.\n- [ ] **TLS at the edge.** The stack is fronted by a reverse proxy terminating TLS; plain HTTP is not the entry point.\n  - *How to verify:* run `curl -kI https://localhost` (or your proxy port) and confirm a TLS response from the proxy; `curl -I http://localhost:11434` from outside the compose network should fail.\n\n## AI Layer\n\n- [ ] **The agent is guarded.** Tool scopes are limited, output validation is in place, a human gate protects any sensitive tool, and agent actions are traced or logged.\n  - *How to verify:* demonstrate one blocked action: send the agent a prompt that tries to trigger a sensitive tool and show the gate or validation stopping it, with the attempt visible in the trace or log.\n- [ ] **LLM guardrails are documented.** Prompt-injection defenses and their known limits are written up (in the wiki or threat model), including residual risk you accepted.\n  - *How to verify:* the write-up names at least one injection technique you tested, what blocked it, and what still partially works.\n\n## Documentation and Governance\n\n- [ ] **threat-model.md is complete.** STRIDE categories, assets, and mitigations are all filled in, with no TODO markers left.\n  - *How to verify:* run `grep -c TODO threat-model.md` and expect 0; confirm the STRIDE table covers assets and mitigations for each category.\n- [ ] **The wiki report is done.** The GitHub Wiki contains the final report with Overview, Architecture, Controls, Findings, and Next Steps, plus the governance artifacts: risk register, AI-use policy, and incident-response note.\n  - *How to verify:* open the wiki and walk each page; no stubs, no TODO markers, and the controls section maps each control to a CO and an SY0-701 domain.\n- [ ] **The Project board is current.** The GitHub Project board reflects real, up-to-date work: done items closed, in-progress items assigned, and a \"definition of done for presentation day\" issue present.\n  - *How to verify:* open the board and confirm no stale cards; the most recent activity should be from this week, not from checkpoint 1.\n\n## Demo\n\n- [ ] **Demo dry-run is done.** The full stack starts clean on the actual presentation machine, the demo path was rehearsed end to end, and display output (HDMI or USB-C) was tested.\n  - *How to verify:* run `docker compose down && docker compose up -d`, wait for healthchecks, and walk the exact demo script on the machine you will present from, connected to an external display.\n- [ ] **The recorded fallback exists.** A recorded demo video is committed or linked in the repo in case the live demo fails.\n  - *How to verify:* the README links the recording and a teammate has confirmed it plays.\n\n## Submission\n\n- [ ] **Links submitted on Canvas.** The GitHub repository and GitHub Project links are submitted through the Capstone Assignment on Canvas before the posted deadline.\n  - *How to verify:* open the Canvas assignment and confirm the submission shows both links and a submitted timestamp.\n", "capstone/team-formation-guide.md": "# Capstone Team Formation Guide\n\n**CSEC 2300 Foundations of Cyber Security** | Instructor: Dr. Gonzalo D Parra\n\n## The Rule\n\nTeams are **2 to 3 students**. No solo capstones, no exceptions, and no teams of four. You will build, harden, and document your secure local-AI stack with the same people all semester, so choose deliberately.\n\n## Compare Schedules Before You Commit\n\nThe single biggest predictor of capstone pain is a team that cannot find time to meet. Before you commit to a team, compare schedule availability with your prospective teammates: you will collaborate and learn together all semester, so make sure you share workable meeting times.\n\nHave every prospective teammate fill in this grid, then overlay them. If you cannot find at least two shared blocks per week, keep looking.\n\n| Time Block | Mon | Tue | Wed | Thu | Fri | Sat | Sun |\n|------------|-----|-----|-----|-----|-----|-----|-----|\n| Morning (before noon) | | | | | | | |\n| Early afternoon | | | | | | | |\n| Late afternoon | | | | | | | |\n| Evening | | | | | | | |\n\nAlso compare, honestly, before committing:\n\n- **Work and family load.** A teammate with a heavy outside schedule is fine if everyone knows it up front and plans around it.\n- **Where you work best.** On campus, remote, or mixed. Agree on your default.\n- **Response expectations.** Agree how fast you answer team messages (for example, within one day on weekdays).\n\n## Split Roles Fairly Across the Semester\n\nEvery member must contribute real commits all semester; the grader checks contribution spread, and the presentation rubric scores teamwork. A fair split is not \"one person does Docker forever.\"\n\n- **Name a starting owner per area**: containers and compose; CI pipeline and repo hygiene; agent and guardrails; documentation, wiki, and board.\n- **Rotate at the checkpoints.** Swapping at least one area at each checkpoint means everyone touches infrastructure, security, and writing before presentation day, where every member speaks.\n- **Pair on the scary parts.** TLS, CI gates, and agent guardrails go faster and stick better with two people on them.\n- **Track it on the board.** Assign every Project board issue to a person. The board is your evidence of fair contribution, and it is graded.\n\n## If a Team Falls Apart\n\nIt happens: a teammate drops the course, goes silent, or stops contributing. The playbook:\n\n1. **Talk inside the team first.** Raise it directly and early; most stalls are a schedule collision, not bad faith.\n2. **Talk to the instructor early.** If a direct conversation does not fix it within a week, email Dr. Gonzalo D Parra or come to office hours. Early means fixable: rebalancing work, adjusting expectations, or in rare cases restructuring teams. A message the week of presentations is too late to help you.\n3. **Keep committing.** Whatever happens, keep your own contributions flowing into the repo and the board. Your individual history is visible and protects you.\n4. **Never carry silently.** Doing a vanished teammate's work without telling anyone hides the problem, burns you out, and skews the grade evidence.\n\nA team of 3 that loses a member becomes a legitimate team of 2 and continues. A team of 2 that loses a member must contact the instructor immediately to be placed, since solo capstones are not allowed.\n"}, "labs": [{"dir": "lab-00-environment-setup", "num": "00", "title": "Lab 0: Environment & Identity Setup", "short": "Environment & Identity Setup", "files": [{"id": "labs/lab-00-environment-setup/README.md", "name": "README.md", "label": "README"}, {"id": "labs/lab-00-environment-setup/STUDENT-GUIDE.md", "name": "STUDENT-GUIDE.md", "label": "Student Guide"}, {"id": "labs/lab-00-environment-setup/HINTS.md", "name": "HINTS.md", "label": "Hints"}, {"id": "labs/lab-00-environment-setup/setup-repo .html"}, {"num": 23, "title": "Lecture 23: Agent Authorization HITL", "file": "slides/lecture-23-agent-authorization-hitl.html"}, {"num": 24, "title": "Lecture 24: Risk Management Policy", "file": "slides/lecture-24-risk-management-policy.html"}, {"num": 25, "title": "Lecture 25: Privacy Compliance Ethics IR", "file": "slides/lecture-25-privacy-compliance-ethics-ir.html"}, {"num": 26, "title": "Lecture 26: Governance Wrap-up Capstone Worksession", "file": "slides/lecture-26-governance-wrapup-capstone-worksession.html"}, {"num": 27, "title": "Lecture 27: Capstone Presentations Day 1", "file": "slides/lecture-27-capstone-presentations-day1.html"}, {"num": 28, "title": "Lecture 28: Capstone Review", "file": "slides/lecture-28-capstone-review.html"}], "study": [{"id": "study-guides/final-study-guide.md", "title": "CSEC 2300 Final Exam Study Guide"}, {"id": "study-guides/midterm-study-guide.md", "title": "CSEC 2300 Midterm Study Guide"}], "capstone": [{"id": "capstone/README.md", "title": "Capstone Document Pack"}, {"id": "capstone/team-formation-guide.md", "title": "Capstone Team Formation Guide"}, {"id": "capstone/proposal-template.md", "title": "Capstone Proposal"}, {"id": "capstone/readiness-checklist.md", "title": "Capstone Readiness Checklist"}, {"id": "capstone/presentation-rubric.md", "title": "Capstone Presentation Rubric"}, {"id": "capstone/peer-feedback-form.md", "title": "Capstone Peer Feedback Form"}]}</script>

"use strict";
var DATA = JSON.parse(document.getElementById('course-data').textContent);

/* =====================================================================
   Markdown -> HTML renderer (self-contained)
   Supports: headings, bold, italic, inline code, fenced code blocks,
   ul/ol incl. nesting, tables, blockquotes, links, images, hr, paragraphs.
   ===================================================================== */
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s){
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// inline formatting (not used inside code blocks)
function inline(text){
  var out='';
  var i=0;
  var n=text.length;
  // We process escapes, code spans, images, links, bold, italic.
  // Use a tokenizer approach for code spans first (protect them).
  var parts=[]; // {code:bool, text}
  var buf='';
  while(i<n){
    var c=text[i];
    if(c==='\\' && i+1<n){ buf+=text[i+1]; i+=2; continue; }
    if(c==='`'){
      // count backticks
      var ticks='`';
      var j=i+1;
      while(j<n && text[j]==='`'){ ticks+='`'; j++; }
      // find matching run of same length
      var close=text.indexOf(ticks, j);
      if(close!==-1){
        parts.push({code:false,text:buf}); buf='';
        var codeContent=text.slice(j, close);
        parts.push({code:true,text:codeContent});
        i=close+ticks.length;
        continue;
      }
    }
    buf+=c; i++;
  }
  parts.push({code:false,text:buf});

  for(var p=0;p<parts.length;p++){
    if(parts[p].code){
      out+='<code>'+escapeHtml(parts[p].text)+'</code>';
    }else{
      out+=inlineNoCode(parts[p].text);
    }
  }
  return out;
}

function inlineNoCode(text){
  var s=escapeHtml(text);
  // images ![alt](src "title")
  s=s.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,function(m,alt,src,title){
    var t=title?' title="'+escapeAttr(title)+'"':'';
    return '<img src="'+escapeAttr(src)+'" alt="'+escapeAttr(alt)+'"'+t+' loading="lazy">';
  });
  // links [text](href "title")
  s=s.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,function(m,txt,href,title){
    var t=title?' title="'+escapeAttr(title)+'"':'';
    var ext=/^https?:\/\//.test(href)?' target="_blank" rel="noopener"':'';
    return '<a href="'+escapeAttr(href)+'"'+t+ext+'>'+txt+'</a>';
  });
  // bold **x** or __x__
  s=s.replace(/\*\*([^*]+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/__([^_]+?)__/g,'<strong>$1</strong>');
  // italic *x* or _x_
  s=s.replace(/(^|[^*])\*(?!\s)([^*]+?)\*(?!\*)/g,'$1<em>$2</em>');
  s=s.replace(/(^|[^_\w])_(?!\s)([^_]+?)_(?![_\w])/g,'$1<em>$2</em>');
  return s;
}

function renderTable(rows){
  // rows: array of raw line strings including header + separator + body
  function cells(line){
    var t=line.trim();
    if(t.charAt(0)==='|') t=t.slice(1);
    if(t.charAt(t.length-1)==='|') t=t.slice(0,-1);
    // split on unescaped pipes
    var res=[]; var cur='';
    for(var k=0;k<t.length;k++){
      if(t[k]==='\\' && t[k+1]==='|'){ cur+='|'; k++; continue; }
      if(t[k]==='|'){ res.push(cur); cur=''; } else cur+=t[k];
    }
    res.push(cur);
    return res.map(function(x){return x.trim();});
  }
  var header=cells(rows[0]);
  var aligns=cells(rows[1]).map(function(c){
    var l=c.charAt(0)===':', r=c.charAt(c.length-1)===':';
    if(l&&r) return 'center'; if(r) return 'right'; if(l) return 'left'; return '';
  });
  var html='<table><thead><tr>';
  header.forEach(function(h,idx){
    var a=aligns[idx]?' style="text-align:'+aligns[idx]+'"':'';
    html+='<th'+a+'>'+inline(h)+'</th>';
  });
  html+='</tr></thead><tbody>';
  for(var r=2;r<rows.length;r++){
    var cs=cells(rows[r]);
    html+='<tr>';
    for(var ci=0;ci<header.length;ci++){
      var a2=aligns[ci]?' style="text-align:'+aligns[ci]+'"':'';
      html+='<td'+a2+'>'+inline(cs[ci]!==undefined?cs[ci]:'')+'</td>';
    }
    html+='</tr>';
  }
  html+='</tbody></table>';
  return html;
}

// list parsing with nesting based on indentation
function renderList(items){
  // items: array of {indent, ordered, text (may include following lines joined)}
  // Build tree by indent
  function build(startIdx, minIndent){
    var html='';
    var i=startIdx;
    var ordered=items[i].ordered;
    var tag=ordered?'ol':'ul';
    html+='<'+tag+'>';
    while(i<items.length){
      var it=items[i];
      if(it.indent<minIndent) break;
      if(it.indent>minIndent){ i++; continue; } // handled by recursion
      html+='<li>'+inline(it.text);
      // look ahead for nested (greater indent)
      if(i+1<items.length && items[i+1].indent>minIndent){
        var res=build(i+1, items[i+1].indent);
        html+=res.html;
        i=res.next;
      }else{
        i++;
      }
      html+='</li>';
    }
    html+='</'+tag+'>';
    return {html:html, next:i};
  }
  return build(0, items[0].indent).html;
}

function renderMarkdown(src){
  src=src.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var lines=src.split('\n');
  var out=[];
  var i=0;
  var para=[];
  function flushPara(){
    if(para.length){
      out.push('<p>'+inline(para.join(' ').trim())+'</p>');
      para=[];
    }
  }
  while(i<lines.length){
    var line=lines[i];

    // fenced code block
    var fence=line.match(/^(\s*)(`{3,}|~{3,})(.*)$/);
    if(fence){
      flushPara();
      var marker=fence[2].charAt(0);
      var minLen=fence[2].length;
      var code=[];
      i++;
      while(i<lines.length){
        var cl=lines[i];
        var cm=cl.match(/^\s*(`{3,}|~{3,})\s*$/);
        if(cm && cm[1].charAt(0)===marker && cm[1].length>=minLen){ i++; break; }
        code.push(cl);
        i++;
      }
      out.push('<pre><code>'+escapeHtml(code.join('\n'))+'</code></pre>');
      continue;
    }

    // blank line
    if(/^\s*$/.test(line)){ flushPara(); i++; continue; }

    // horizontal rule
    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)){ flushPara(); out.push('<hr>'); i++; continue; }

    // heading
    var h=line.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
    if(h){ flushPara(); var lvl=h[1].length; out.push('<h'+lvl+'>'+inline(h[2])+'</h'+lvl+'>'); i++; continue; }

    // table: current line has pipe and next line is a separator row
    if(/\|/.test(line) && i+1<lines.length && /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)+\|?\s*$/.test(lines[i+1])){
      flushPara();
      var trows=[line, lines[i+1]];
      i+=2;
      while(i<lines.length && /\|/.test(lines[i]) && !/^\s*$/.test(lines[i])){
        trows.push(lines[i]); i++;
      }
      out.push(renderTable(trows));
      continue;
    }

    // blockquote
    if(/^\s*>/.test(line)){
      flushPara();
      var bq=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){
        bq.push(lines[i].replace(/^\s*>\s?/,''));
        i++;
      }
      out.push('<blockquote>'+renderMarkdown(bq.join('\n'))+'</blockquote>');
      continue;
    }

    // lists (unordered or ordered), possibly nested
    var lm=line.match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
    if(lm){
      flushPara();
      var items=[];
      while(i<lines.length){
        var ll=lines[i];
        var m2=ll.match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
        if(m2){
          items.push({
            indent:m2[1].replace(/\t/g,'    ').length,
            ordered:/\d/.test(m2[2]),
            text:m2[3]
          });
          i++;
        }else if(/^\s+\S/.test(ll) && items.length){
          // continuation line of previous item
          items[items.length-1].text+=' '+ll.trim();
          i++;
        }else if(/^\s*$/.test(ll)){
          // possible loose list; peek next
          if(i+1<lines.length && /^(\s*)([-*+]|\d+[.)])\s+/.test(lines[i+1])){ i++; continue; }
          break;
        }else break;
      }
      out.push(renderList(items));
      continue;
    }

    // paragraph text
    para.push(line.trim());
    i++;
  }
  flushPara();
  return out.join('\n');
}

/* =====================================================================
   Navigation build
   ===================================================================== */
var nav=document.getElementById('nav');

function el(tag, cls, html){
  var e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html!==undefined) e.innerHTML=html;
  return e;
}

function makeGroup(title){
  var g=el('div','navgroup');
  g.appendChild(el('div','gh',title));
  var ul=el('ul','tree');
  g.appendChild(ul);
  nav.appendChild(g);
  return ul;
}

// leaf that renders a markdown doc
function mdLeaf(ul, id, label, meta){
  var li=el('li');
  var b=el('button','leaf');
  b.type='button';
  b.dataset.doc=id;
  b.innerHTML='<span>'+label+'</span>'+(meta?'<span class="meta">'+meta+'</span>':'');
  b.addEventListener('click',function(){ location.hash=id; });
  li.appendChild(b);
  ul.appendChild(li);
  return li;
}

// external html link leaf
function extLeaf(ul, href, label){
  var li=el('li');
  var a=el('a','ext');
  a.href=href; a.target='_blank'; a.rel='noopener';
  a.innerHTML='<span>'+label+'</span>';
  li.appendChild(a);
  ul.appendChild(li);
  return li;
}

// expandable node
function expandable(ul, label, meta){
  var li=el('li','expandable');
  var btn=el('button','tw');
  btn.type='button';
  btn.setAttribute('aria-expanded','false');
  btn.innerHTML='<span class="caret">&#9654;</span><span>'+label+'</span>'+(meta?'<span class="meta">'+meta+'</span>':'');
  var kids=el('ul','children');
  btn.addEventListener('click',function(){
    var open=li.classList.toggle('open');
    btn.setAttribute('aria-expanded', open?'true':'false');
  });
  li.appendChild(btn);
  li.appendChild(kids);
  ul.appendChild(li);
  return {li:li, kids:kids};
}

// --- Presentation group ---
var gPres=makeGroup('Presentation');
extLeaf(gPres,'course-hub.html','Course Hub');
extLeaf(gPres,'course-outline.html','Course Outline');
var slidesNode=expandable(gPres,'Slides', DATA.slides.length+' decks');
DATA.slides.forEach(function(s){ extLeaf(slidesNode.kids, s.file, s.title); });

// --- Labs group ---
var gLabs=makeGroup('Labs');
DATA.labs.forEach(function(lab){
  var node=expandable(gLabs, lab.title, lab.files.length+' files');
  node.li.dataset.lab=lab.dir;
  lab.files.forEach(function(f){
    mdLeaf(node.kids, f.id, f.label);
  });
});

// --- Study Guides ---
var gStudy=makeGroup('Study Guides');
DATA.study.forEach(function(s){ mdLeaf(gStudy, s.id, s.title.replace(/^CSEC 2300\s*-?\s*/i,'')); });

// --- Capstone ---
var gCap=makeGroup('Capstone');
DATA.capstone.forEach(function(c){ mdLeaf(gCap, c.id, c.title.replace(/^Capstone\s*[-:]\s*/i,'')); });

/* =====================================================================
   Routing + rendering
   ===================================================================== */
var content=document.getElementById('content');
var crumbs=document.getElementById('crumbs');

function labFor(id){
  var m=id.match(/^labs\/([^/]+)\//);
  if(!m) return null;
  return DATA.labs.filter(function(l){return l.dir===m[1];})[0]||null;
}
function fileLabel(id){
  var lab=labFor(id);
  if(lab){
    var f=lab.files.filter(function(x){return x.id===id;})[0];
    return {group:'Labs', parent:lab.title, name:f?f.label:id};
  }
  var st=DATA.study.filter(function(s){return s.id===id;})[0];
  if(st) return {group:'Study Guides', parent:null, name:st.title};
  var cp=DATA.capstone.filter(function(c){return c.id===id;})[0];
  if(cp) return {group:'Capstone', parent:null, name:cp.title};
  return {group:'', parent:null, name:id};
}

function setActive(id){
  var leaves=nav.querySelectorAll('.leaf');
  for(var k=0;k<leaves.length;k++){
    var on=leaves[k].dataset.doc===id;
    leaves[k].classList.toggle('active', on);
    if(on){
      // open ancestors
      var p=leaves[k];
      while(p && p!==nav){
        if(p.classList && p.classList.contains('expandable')){
          p.classList.add('open');
          var tw=p.querySelector(':scope > .tw');
          if(tw) tw.setAttribute('aria-expanded','true');
        }
        p=p.parentElement;
      }
    }
  }
}

function renderDoc(id){
  var md=DATA.docs[id];
  if(md===undefined){ renderWelcome(); return; }
  var info=fileLabel(id);
  crumbs.innerHTML=info.group+(info.parent?' / '+esc(info.parent):'')+' / <span>'+esc(info.name)+'</span>';
  var box=el('div','md');
  box.innerHTML=renderMarkdown(md);
  content.innerHTML='';
  content.appendChild(box);
  setActive(id);
  window.scrollTo(0,0);
  document.body.classList.remove('nav-open');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderWelcome(){
  crumbs.innerHTML='<span>Overview</span>';
  setActive('__none__');
  var rows='';
  DATA.labs.forEach(function(lab){
    var readme=lab.files.filter(function(f){return /README\.md$/.test(f.id);})[0];
    var target=readme?readme.id:lab.files[0].id;
    rows+='<tr><td class="num">'+esc(lab.num)+'</td>'+
      '<td><a data-doc="'+esc(target)+'">'+esc(lab.short)+'</a></td>'+
      '<td>'+lab.files.length+' file'+(lab.files.length>1?'s':'')+'</td></tr>';
  });
  content.innerHTML=
    '<div class="welcome">'+
      '<p class="kicker">Course Resource Browser</p>'+
      '<h1>Foundations of Cyber Security</h1>'+
      '<p class="lead">Everything for CSEC 2300 in one place: lecture decks, hands-on labs, study guides, and capstone materials. Pick an item in the sidebar, or start with a lab below. Deep links are shareable.</p>'+
      '<div class="cardrow">'+
        '<div class="qcard" data-jump="slides"><div class="n">'+DATA.slides.length+'</div><div class="l">Lecture decks</div></div>'+
        '<div class="qcard" data-jump="labs"><div class="n">'+DATA.labs.length+'</div><div class="l">Hands-on labs</div></div>'+
        '<div class="qcard" data-jump="study"><div class="n">'+DATA.study.length+'</div><div class="l">Study guides</div></div>'+
        '<div class="qcard" data-jump="capstone"><div class="n">'+DATA.capstone.length+'</div><div class="l">Capstone docs</div></div>'+
      '</div>'+
      '<h2 style="font-size:1.2rem;margin:0 0 .3rem">Lab index</h2>'+
      '<table class="labtable"><thead><tr><th class="num">#</th><th>Lab</th><th>Materials</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '</div>';
  // wire lab links
  content.querySelectorAll('.labtable a[data-doc]').forEach(function(a){
    a.addEventListener('click',function(){ location.hash=a.dataset.doc; });
  });
  content.querySelectorAll('.qcard[data-jump]').forEach(function(c){
    c.addEventListener('click',function(){
      var g=c.dataset.jump;
      var map={slides:'Presentation',labs:'Labs',study:'Study Guides',capstone:'Capstone'};
      var groups=nav.querySelectorAll('.navgroup .gh');
      for(var q=0;q<groups.length;q++){
        if(groups[q].textContent===map[g]){ groups[q].scrollIntoView({behavior:'smooth',block:'start'}); break; }
      }
    });
  });
  window.scrollTo(0,0);
}

function route(){
  var h=decodeURIComponent(location.hash.replace(/^#/,''));
  if(h && DATA.docs[h]!==undefined){ renderDoc(h); }
  else{ renderWelcome(); }
}
window.addEventListener('hashchange', route);

/* =====================================================================
   Search filter
   ===================================================================== */
var search=document.getElementById('search');
search.addEventListener('input', function(){
  var q=search.value.trim().toLowerCase();
  var groups=nav.querySelectorAll('.navgroup');
  groups.forEach(function(g){
    var anyGroup=false;
    // handle expandables and leaves
    var topItems=g.querySelectorAll(':scope > ul > li');
    topItems.forEach(function(li){
      if(li.classList.contains('expandable')){
        var label=li.querySelector(':scope > .tw > span:not(.caret):not(.meta)');
        var labText=label?label.textContent.toLowerCase():'';
        var kids=li.querySelectorAll(':scope > ul > li');
        var anyKid=false;
        kids.forEach(function(kid){
          var txt=kid.textContent.toLowerCase();
          var show=!q || txt.indexOf(q)!==-1 || labText.indexOf(q)!==-1;
          kid.style.display=show?'':'none';
          if(show) anyKid=true;
        });
        var showLi=!q ? true : (anyKid || labText.indexOf(q)!==-1);
        li.style.display=showLi?'':'none';
        if(showLi) anyGroup=true;
        if(q && anyKid){ li.classList.add('open'); }
        else if(!q){ /* leave as-is */ }
      }else{
        var txt=li.textContent.toLowerCase();
        var show=!q || txt.indexOf(q)!==-1;
        li.style.display=show?'':'none';
        if(show) anyGroup=true;
      }
    });
    g.style.display=anyGroup?'':'none';
  });
});

/* =====================================================================
   Theme toggle
   ===================================================================== */
var themeBtn=document.getElementById('themeBtn');
var themeIcon=document.getElementById('themeIcon');
function applyTheme(t){
  if(t==='dark'||t==='light'){ document.documentElement.setAttribute('data-theme',t); }
  else{ document.documentElement.removeAttribute('data-theme'); }
  var dark = t==='dark' || (t!=='light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  themeIcon.innerHTML = dark ? '&#9788;' : '&#9789;'; // sun when dark (to switch to light), moon when light
}
var stored=null;
try{ stored=localStorage.getItem('csec2300-theme'); }catch(e){}
applyTheme(stored||'auto');
themeBtn.addEventListener('click', function(){
  var cur=document.documentElement.getAttribute('data-theme');
  var next = cur==='dark' ? 'light' : (cur==='light' ? 'dark' : (window.matchMedia('(prefers-color-scheme: dark)').matches?'light':'dark'));
  applyTheme(next);
  try{ localStorage.setItem('csec2300-theme', next); }catch(e){}
});

/* =====================================================================
   Mobile nav
   ===================================================================== */
document.getElementById('menuBtn').addEventListener('click',function(){
  document.body.classList.toggle('nav-open');
});
document.getElementById('scrim').addEventListener('click',function(){
  document.body.classList.remove('nav-open');
});

// init
route();
})();
</script>
