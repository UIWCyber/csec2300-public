<script>
const DOCS = {"h01-cia-triage-cards.md": "# Handout H01: CIA Triage Cards\n\n**CSEC 2300 Foundations of Cyber Security | Dr. Gonzalo D Parra**\n**Used with Lecture 1: Course Launch | In-Class Activity: CIA Triage (think, pair, share)**\n\n## Instructions\n\n1. **Solo (2 minutes).** Read the six incident headlines below. Tag each one with the CIA property or properties it violates: **C** (Confidentiality), **I** (Integrity), and/or **A** (Availability).\n2. **Pairs (3 minutes).** Compare answers with a partner. Most incidents hit at least two properties. If you tagged only one, find the second one.\n3. **Debrief (5 minutes).** Be ready to defend your tags when cold-called. The point is the triad as an analysis lens, not trivia.\n\n## The Six Headlines\n\n| # | Headline | C | I | A |\n|---|----------|---|---|---|\n| 1 | Attackers steal a retailer's customer database containing 40 million payment records |   |   |   |\n| 2 | A botnet floods a regional bank's online portal, knocking it offline during business hours |   |   |   |\n| 3 | Hacktivists replace a city government's homepage with a political manifesto |   |   |   |\n| 4 | A departing employee emails the company's confidential product roadmap to a competitor |   |   |   |\n| 5 | Ransomware encrypts a hospital's patient records; staff cannot open a single file |   |   |   |\n| 6 | An intern force-pushes over the main branch and three weeks of commit history vanish |   |   |   |\n\n**Tip:** Ask three questions of every incident. Did someone see data they should not see (C)? Did data change or disappear in a way that breaks trust (I)? Did a system or its data become unusable for legitimate users (A)?\n\n---\n\n*(The instructor keeps the answer key in a separate copy.)*\n", "h02-control-classification.md": "# Handout H02: Control Sort Relay\n\n**CSEC 2300 Foundations of Cyber Security | Dr. Gonzalo D Parra**\n**Used with Lecture 2: Threat Actors & Frameworks | In-Class Activity: Control Sort Relay**\n\n## Instructions\n\n1. Form groups of four.\n2. **Sort (6 minutes).** Your group gets the 12 controls below. For each control, write BOTH labels: its **category** (who or what enforces it) and its **function** (what it achieves). Place each control in the grid.\n3. **Debrief (4 minutes).** The instructor reveals the intended answers. Argue the ambiguous ones. Ambiguity is normal; defend your reasoning.\n\n**Reminders**\n\n- **Categories:** Technical (systems enforce it), Managerial (decisions and policy), Operational (people and process), Physical (real-world barriers)\n- **Functions:** Preventive (block it), Deterrent (discourage it), Detective (notice it), Corrective (fix it after), Compensating (substitute control), Directive (tell people what to do)\n- One control can serve several functions. Classify by its *primary* purpose, then note the second one if it is strong.\n\n## The 12 Controls\n\n1. MFA on logins\n2. Warning banner at login\n3. CCTV cameras\n4. Backup restore test\n5. Security awareness training\n6. Container image scanning in CI\n7. Acceptable use policy (AUP)\n8. Bollard in front of the entrance\n9. IDS alert\n10. Patching SLA\n11. Branch protection on main\n12. Security guard\n\n## Classification Grid\n\nWrite each control's number in the cell where category and function meet. Some controls earn two cells.\n\n| Function \\ Category | Technical | Managerial | Operational | Physical |\n|---------------------|-----------|------------|-------------|----------|\n| Preventive          |           |            |             |          |\n| Deterrent           |           |            |             |          |\n| Detective           |           |            |             |          |\n| Corrective          |           |            |             |          |\n| Compensating        |           |            |             |          |\n| Directive           |           |            |             |          |\n\n---\n\n*(The instructor keeps the answer key in a separate copy.)*\n", "h08-supply-chain-hops.md": "# Handout H08: Supply-Chain Threat Mapping Hop Cards\n\n**CSEC 2300 Foundations of Cyber Security | Dr. Gonzalo D Parra**\n**Used with Lecture 8: Supply Chain & Branch Protection | In-Class Activity: Supply-chain threat mapping (groups of 3)**\n\n## Instructions\n\n1. Your group is assigned ONE hop of the software supply chain: **Source**, **Build**, **Registry**, or **Consumer**. Read only your card below.\n2. **Attack (about 3 minutes).** For your hop, list **two realistic attacks** against it.\n3. **Defend (about 2 minutes).** For each attack, name **one control** that addresses it and tag the control **preventive** or **detective**.\n4. **Report (60 seconds per group).** Present your hop, your attacks, and your controls. The instructor fills gaps and marks which controls already exist in the class capstone stack.\n\n**The chain:** Maintainer writes code -> Source repo -> Build system -> Registry -> Your install (consumer). Every hop is an attack surface.\n\n---\n\n## Card 1: SOURCE (the repository and its maintainers)\n\n**Scenario.** Your team depends on an open-source library maintained by two volunteers. Anyone can propose changes; the maintainers merge them. The code that everyone downstream trusts starts here.\n\n- How would an attacker get malicious code INTO this hop?\n- How would you defend it? One control per attack, tagged preventive or detective.\n\n## Card 2: BUILD (the CI system that turns source into artifacts)\n\n**Scenario.** A CI pipeline checks out the source, pulls build tools and dependencies, compiles, and signs the output. Whatever the build produces is what ships, whether or not it matches the source.\n\n- How would an attacker make the build EMIT something the source does not contain?\n- How would you defend it? One control per attack, tagged preventive or detective.\n\n## Card 3: REGISTRY (where packages and images are published and fetched)\n\n**Scenario.** Built artifacts are published to a public registry (npm, PyPI, Docker Hub). Millions of installs pull from it by name and version. Names are cheap and anyone can publish.\n\n- How would an attacker get a malicious artifact SERVED from this hop?\n- How would you defend it? One control per attack, tagged preventive or detective.\n\n## Card 4: CONSUMER (your project's install and update process)\n\n**Scenario.** Your project runs `pip install` and `docker pull` in CI on every build. Dependency versions are not pinned; whatever is \"latest\" at build time is what ships to your users.\n\n- How would an attacker exploit YOUR side of the chain, even if every upstream hop behaves?\n- How would you defend it? One control per attack, tagged preventive or detective.\n\n---\n\n*(The instructor keeps the answer key in a separate copy.)*\n", "h11-network-segmentation-scenario.md": "# Handout H11: Design the Segments\n\n**CSEC 2300 Foundations of Cyber Security | Dr. Gonzalo D Parra**\n**Used with Lecture 11: Container Networking, Segmentation & Secrets | In-Class Activity: Design the segments**\n\n## Instructions\n\n1. **Pairs (6 minutes).** Read the scenario and requirements. Design the network segmentation: which Docker networks exist, which service joins which network, and which SINGLE port is published to the host.\n2. **Compare with a neighbor pair.** Any service that can reach something it does not need to reach is a **finding**. Hunt for findings in each other's designs.\n3. **Debrief.** Compare with the canonical answer. This design mirrors the Lab 4 bonus task.\n\n**Design rule:** \"can reach\" should equal \"needs to reach\". Two containers can talk if and only if they share at least one network. Publishing a port exposes a container to the host and the outside world.\n\n## The Scenario: Five Services\n\n| Service | Role |\n|---------|------|\n| `proxy` | Reverse proxy; the only front door, terminates outside connections |\n| `webapp` | Public web application served to users through the proxy |\n| `api` | Internal API; business logic; the only service that queries the database |\n| `db` | Database; holds all persistent data |\n| `admin` | Admin dashboard; staff-only interface, also served through the proxy |\n\n## Communication Requirements (who MUST talk to whom)\n\n- The outside world reaches ONLY the reverse proxy, on one published port (443).\n- `proxy` must reach `webapp` and `admin` (it forwards user and staff traffic to them).\n- `webapp` must reach `api` (all app data flows through the API).\n- `admin` must reach `api` (staff actions also go through the API).\n- `api` must reach `db` (the only service allowed to touch data).\n- Nothing else needs to talk to anything else. In particular: `webapp` and `admin` must NOT reach `db` directly, and `proxy` must NOT reach `api` or `db`.\n\n## Your Design\n\nNetworks you will create (name them):\n\n1. ______________________  2. ______________________  3. ______________________ (use fewer or more if you can justify it)\n\nMembership grid: mark X where a service joins a network. Then circle the ONE published port.\n\n| Service | Network 1: ________ | Network 2: ________ | Network 3: ________ | Published port? |\n|---------|--------------------|--------------------|--------------------|-----------------|\n| proxy   |                    |                    |                    |                 |\n| webapp  |                    |                    |                    |                 |\n| api     |                    |                    |                    |                 |\n| db      |                    |                    |                    |                 |\n| admin   |                    |                    |                    |                 |\n\nSelf-check before comparing: for every pair of services that share a network, ask \"does the requirements list say they NEED to talk?\" If not, that is a finding in your own design.\n\n---\n\n*(The instructor keeps the answer key in a separate copy.)*\n", "h13-certificate-worksheet.md": "# Handout H13: Cert Autopsy Worksheet\n\n**CSEC 2300 Foundations of Cyber Security | Dr. Gonzalo D Parra**\n**Used with Lecture 13: PKI, TLS & Certificates | In-Class Activity: Cert Autopsy**\n\n## Instructions\n\n1. On your own laptop or phone, open **three HTTPS sites you use daily** and view each site's certificate (steps below).\n2. For each site, fill one row of the worksheet: subject, issuer organization, days until expiry, number of SANs, and chain length.\n3. **Pair up and compare.** Same issuer? A small number of CAs (Let's Encrypt, DigiCert) dominate; be ready to discuss CA market concentration as a systemic risk.\n4. Find the **strangest SAN** among your three sites. Two students will report theirs; the class discusses why one certificate carries many names.\n\n## How to View a Certificate\n\n**Chrome (desktop):** click the icon to the left of the address bar (tune/lock icon) -> **Connection is secure** -> **Certificate is valid**. A viewer opens with General and Details tabs. SANs are in Details under \"Subject Alternative Name\". The chain appears at the top of the viewer.\n\n**Firefox (desktop):** click the padlock in the address bar -> **Connection secure** -> **More information** -> **View Certificate**. A full-page viewer opens with one tab per certificate in the chain; SANs are listed under \"Subject Alt Names\".\n\n**Counting tips**\n\n- **Days until expiry:** subtract today from the \"Valid To / Expires On\" date; a rough count is fine.\n- **Number of SANs:** count every DNS name listed under Subject Alternative Name (wildcards like `*.example.com` count as one).\n- **Chain length:** count the certificates from the site's own (leaf) up to and including the root the viewer shows. Most public sites show 2 or 3.\n\n## Worksheet\n\n| | Site (URL) | Subject (CN) | Issuer organization | Days until expiry | Number of SANs | Chain length |\n|---|-----------|--------------|--------------------|-------------------|----------------|--------------|\n| Ex. | `www.example.com` (illustrative) | `www.example.com` | DigiCert Inc | 143 | 2 (`www.example.com`, `example.com`) | 3 (leaf -> intermediate -> root) |\n| 1 | | | | | | |\n| 2 | | | | | | |\n| 3 | | | | | | |\n\n**Pair-compare notes:** issuers in common: ______________  strangest SAN found: ______________\n\n---\n\n*(The instructor keeps the answer key in a separate copy.)*\n", "h14-midterm-rapid-rounds.md": "# Handout H14: Midterm Review Rapid Rounds\n\n**Course:** CSEC 2300 Foundations of Cyber Security \u00b7 Dr. Gonzalo D Parra\n**Used in:** Lecture 14 (IAM + Midterm Review), In-Class Activity\n**Format:** Twenty timed questions, one at a time on the projector (or loaded into any quiz tool).\nStudents answer solo on phones or laptops; thirty-second explanation after each question.\nFour questions per module, Modules 1 through 5.\n\n## Round 1: Module 1 - InfoSec Foundations\n\n1. Ransomware encrypts a hospital's patient records so staff cannot open them. Which CIA property is MOST directly violated?\n   a) Confidentiality  b) Integrity  c) Availability  d) Non-repudiation\n2. Proving who you are vs. what you are allowed to do: which pair is correct?\n   a) Authorization / Authentication  b) Authentication / Authorization  c) Accounting / Authentication  d) Authentication / Accounting\n3. A warning banner on a login screen is best classified as which control function?\n   a) Preventive  b) Corrective  c) Deterrent  d) Compensating\n4. Which NIST CSF function does an incident-response runbook primarily support?\n   a) Identify  b) Protect  c) Detect  d) Respond\n\n## Round 2: Module 2 - Git and Collaborative Security\n\n5. Which Git area holds changes after `git add` but before `git commit`?\n   a) Working directory  b) Staging area  c) Remote  d) Stash\n6. Every Git commit ID is a hash of its content AND its parent commit. What security property does that chain give the history?\n   a) Confidentiality  b) Availability  c) Tamper evidence (integrity)  d) Least privilege\n7. A signed commit provides which security concept?\n   a) Availability  b) Non-repudiation  c) Segmentation  d) Obfuscation\n8. You accidentally committed an API key and then deleted the file in a new commit. Is the key gone?\n   a) Yes, deleted  b) No, it remains in history; rotate the key  c) Only if you push  d) Only on GitHub\n\n## Round 3: Module 3 - CI/CD and DevSecOps\n\n9. \"Shift left\" means:\n   a) Move security checks earlier in development  b) Move servers to the cloud  c) Deploy faster  d) Reduce logging\n10. Which scan type analyzes source code WITHOUT running it?\n    a) DAST  b) SAST  c) Fuzzing  d) Pen test\n11. A dependency with a known CVE is flagged by which scan?\n    a) Secret scanning  b) SCA (software composition analysis)  c) DAST  d) Linting\n12. Branch protection that requires a passing CI run before merge is which control function?\n    a) Detective  b) Corrective  c) Preventive  d) Deterrent\n\n## Round 4: Module 4 - Docker and Containers\n\n13. Image vs. container:\n    a) Same thing  b) Image is the running instance  c) Image is the template; container is the running instance  d) Container is the template\n14. Containers isolate processes using which kernel features?\n    a) Hypervisor and firmware  b) Namespaces and cgroups  c) TPM and secure boot  d) VLANs and ACLs\n15. Which Dockerfile line most reduces blast radius if the app is compromised?\n    a) `FROM ubuntu:latest`  b) `USER appuser`  c) `ENV API_KEY=...`  d) `EXPOSE 80`\n16. Why is `FROM ubuntu:latest` a supply-chain risk?\n    a) Ubuntu is insecure  b) The tag moves, so builds are not reproducible or reviewable  c) It is too small  d) It blocks HEALTHCHECK\n\n## Round 5: Module 5 - Cryptography and IAM\n\n17. Hybrid encryption (like TLS) uses asymmetric crypto to:\n    a) Encrypt all the data  b) Exchange the symmetric session key  c) Hash passwords  d) Compress traffic\n18. A password plus a PIN is:\n    a) Two-factor authentication  b) One factor used twice (both are something you know)  c) Biometric MFA  d) Passwordless\n19. Access decided by rules over user and resource attributes (department, time of day, data label) is:\n    a) DAC  b) MAC  c) RBAC  d) ABAC\n20. What does a digital certificate bind together?\n    a) A password and a username  b) A public key and an identity, vouched by a CA  c) Two symmetric keys  d) A hash and a salt\n\n*(The instructor keeps the answer key in a separate copy.)*\n", "h25-ir-tabletop-injects.md": "# Handout H25: IR Tabletop Injects\n\n**CSEC 2300 Foundations of Cyber Security | Dr. Gonzalo D Parra**\n**Used with Lecture 25: Privacy, Compliance, Ethics & IR | In-Class Activity: Tabletop incident**\n\n## Instructions (student copy)\n\n1. Form groups of three to four. You are the on-call security team for your own capstone stack (Open WebUI + Ollama + RAG documents, running in Docker).\n2. The instructor reads the injects **one at a time**. Do not read ahead.\n3. After each inject, your group has **2 minutes** to write your **next action** (one or two sentences: what you do first, and why).\n4. Two or three groups share after each inject; the instructor labels which IR phase your action belongs to: **Prepare, Detect & Analyze, Contain, Eradicate, Recover, Lessons Learned**.\n5. Rule of thumb under pressure: stop the bleeding before you investigate, but do not destroy the evidence while you do it.\n\n## The Injects (instructor reads aloud, one at a time)\n\n**Inject 1: the exposed service.** You get a message from a classmate: \"Is your capstone demo supposed to be public? I can chat with your model from my phone.\" You check and your Open WebUI port is published to the whole network, and the logs show this:\n\n```\nPOST /api/chat   from 203.0.113.9   user=unknown\nPOST /api/upload rag_doc=\"ignore_all_rules.txt\"\nGET  /api/models from 203.0.113.9\n```\n\n*Your next action?*\n\n**Inject 2: the data was touched.** While scoping the logs, you confirm the unknown user did more than chat: they uploaded a document into your RAG store, and your RAG store also contains the course-project notes your team loaded, including a file with classmates' names and email addresses. You cannot yet tell what the model may have revealed in its answers.\n\n*Your next action?*\n\n**Inject 3: the notification question.** Your team lead asks: \"Do we have to tell anyone about this? The classmates whose names were in there? The university? Who decides, and how fast?\"\n\n*Your next action?*\n\n**Closing inject: the regulator.** A compliance officer asks your team directly: \"Was student data in the RAG documents?\" Which regulation governs this, and what is your obligation?\n\n*Your answer?*\n\n**Debrief:** which of THIS course's controls (segmentation, scanning, logging, backups, guardrails, human gates) would have prevented or detected each inject?\n\n---\n\n*(The instructor keeps the answer key in a separate copy.)*\n"};
const ITEMS = [{"key": "h01-cia-triage-cards.md", "label": "Handout H01: CIA Triage Cards"}, {"key": "h02-control-classification.md", "label": "Handout H02: Control Sort Relay"}, {"key": "h08-supply-chain-hops.md", "label": "Handout H08: Supply-Chain Threat Mapping Hop Cards"}, {"key": "h11-network-segmentation-scenario.md", "label": "Handout H11: Design the Segments"}, {"key": "h13-certificate-worksheet.md", "label": "Handout H13: Cert Autopsy Worksheet"}, {"key": "h14-midterm-rapid-rounds.md", "label": "Handout H14: Midterm Review Rapid Rounds"}, {"key": "h25-ir-tabletop-injects.md", "label": "Handout H25: IR Tabletop Injects"}];
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){
  s=s.replace(/`([^`]+)`/g,(m,c)=>'<code>'+esc(c)+'</code>');
  s=s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/__([^_]+)__/g,'<strong>$1</strong>');
  s=s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');
  return s;
}
function mdToHtml(md){
  const lines=md.replace(/\r/g,'').split('\n');const out=[];let i=0;
  function isTableSep(l){return /^\s*\|?\s*:?-{2,}/.test(l)&&l.includes('-');}
  while(i<lines.length){
    let l=lines[i];
    if(/^```/.test(l)){let buf=[];i++;while(i<lines.length&&!/^```/.test(lines[i])){buf.push(lines[i]);i++;}i++;out.push('<pre><code>'+esc(buf.join('\n'))+'</code></pre>');continue;}
    let hm=l.match(/^(#{1,6})\s+(.*)$/);if(hm){out.push('<h'+hm[1].length+'>'+inline(esc(hm[2]))+'</h'+hm[1].length+'>');i++;continue;}
    if(/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(l)){out.push('<hr>');i++;continue;}
    if(l.includes('|')&&i+1<lines.length&&isTableSep(lines[i+1])){
      const header=l.split('|').map(c=>c.trim()).filter((c,idx,a)=>!(idx===0&&c==='')&&!(idx===a.length-1&&c===''));
      i+=2;const rows=[];
      while(i<lines.length&&lines[i].includes('|')&&lines[i].trim()){
        rows.push(lines[i].split('|').map(c=>c.trim()).filter((c,idx,a)=>!(idx===0&&c==='')&&!(idx===a.length-1&&c==='')));i++;}
      let t='<table><thead><tr>'+header.map(h=>'<th>'+inline(esc(h))+'</th>').join('')+'</tr></thead><tbody>';
      t+=rows.map(r=>'<tr>'+r.map(c=>'<td>'+inline(esc(c))+'</td>').join('')+'</tr>').join('');
      out.push(t+'</tbody></table>');continue;}
    if(/^\s*>/.test(l)){let buf=[];while(i<lines.length&&/^\s*>/.test(lines[i])){buf.push(lines[i].replace(/^\s*>\s?/,''));i++;}out.push('<blockquote>'+inline(esc(buf.join(' ')))+'</blockquote>');continue;}
    if(/^\s*(\d+)\.\s+/.test(l)){let buf=[];while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){buf.push(lines[i].replace(/^\s*\d+\.\s+/,''));i++;}out.push('<ol>'+buf.map(b=>'<li>'+inline(esc(b))+'</li>').join('')+'</ol>');continue;}
    if(/^\s*[-*+]\s+/.test(l)){let buf=[];while(i<lines.length&&/^\s*[-*+]\s+/.test(lines[i])){buf.push(lines[i].replace(/^\s*[-*+]\s+/,''));i++;}out.push('<ul>'+buf.map(b=>'<li>'+inline(esc(b))+'</li>').join('')+'</ul>');continue;}
    if(l.trim()===''){i++;continue;}
    let buf=[l];i++;while(i<lines.length&&lines[i].trim()!==''&&!/^(#{1,6}\s|```|\s*>|\s*[-*+]\s|\s*\d+\.\s)/.test(lines[i])&&!(lines[i].includes('|')&&i+1<lines.length&&isTableSep(lines[i+1]))){buf.push(lines[i]);i++;}
    out.push('<p>'+inline(esc(buf.join(' ')))+'</p>');
  }
  return out.join('\n');
}
function show(key){
  document.getElementById('main').innerHTML=mdToHtml(DOCS[key]||'# Not found');
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.k===key));
  location.hash=encodeURIComponent(key);window.scrollTo(0,0);
}
function build(){
  const nav=document.getElementById('nav');
  ITEMS.forEach(it=>{const a=document.createElement('a');a.textContent=it.label;a.dataset.k=it.key;a.onclick=()=>show(it.key);nav.appendChild(a);});
  const h=decodeURIComponent(location.hash.slice(1));
  show(ITEMS.find(x=>x.key===h)?h:(ITEMS[0]&&ITEMS[0].key));
}
function tt(){const r=document.documentElement;const cur=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');r.setAttribute('data-theme',cur==='dark'?'light':'dark');}
build();
</script></body></html>
